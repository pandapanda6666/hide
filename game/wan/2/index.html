<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽博霓虹：無密碼版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --bg-color: #050510;
            --neon-green: #00ff88;
            --neon-pink: #ff0066;
            --neon-purple: #bc13fe;
            --neon-blue: #00d2ff;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Orbitron', 'PingFang TC', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* 掃描線特效 */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        #game-container {
            position: relative;
            padding: 10px;
            background: linear-gradient(45deg, #1a1a2e, #0f0f1a);
            border: 3px solid #222;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.15), inset 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            border-radius: 8px;
            background-color: #000;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 210, 255, 0.3);
            color: var(--neon-blue);
            width: 65px;
            height: 65px;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
        }

        .control-btn:active {
            background: var(--neon-blue);
            color: black;
            transform: scale(0.9);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        #overlay {
            position: absolute;
            top: 10px; left: 10px; width: calc(100% - 20px); height: calc(100% - 20px);
            background: rgba(5, 5, 16, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border-radius: 8px;
        }

        .hidden { display: none !important; }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--neon-blue);
            padding: 10px 20px;
            min-width: 120px;
        }
    </style>
</head>
<body>

    <div class="mb-8 text-center">
        <h1 class="text-5xl font-black mb-4 tracking-[0.2em] italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 animate-pulse">
            CYBER SNAKE
        </h1>
        <div class="stats-container">
            <div class="stat-card">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest">Data Points</div>
                <div id="score" class="text-3xl font-bold text-white tracking-tighter">0</div>
            </div>
            <div class="stat-card border-pink-500">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest">System Peak</div>
                <div id="high-score" class="text-3xl font-bold text-pink-500 tracking-tighter">0</div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="overlay">
            <div class="mb-4 text-xs tracking-[0.5em] text-blue-400 uppercase">Neural Link Established</div>
            <h2 id="overlay-title" class="text-4xl font-black mb-10 text-white italic tracking-tighter">INITIALIZING...</h2>
            
            <button id="start-btn" class="group relative px-10 py-4 bg-transparent border-2 border-green-500 text-green-500 font-bold overflow-hidden transition-all hover:bg-green-500 hover:text-black">
                <span class="relative z-10">START INTERFACE</span>
                <div class="absolute inset-0 bg-green-500 transform translate-y-full transition-transform group-hover:translate-y-0"></div>
            </button>
            <div class="mt-8 text-[10px] text-gray-600 uppercase tracking-widest">Infinity Bound / No Borders Enabled</div>
        </div>
    </div>

    <div class="controls md:flex md:gap-4 lg:hidden">
        <div></div>
        <button class="control-btn" onmousedown="handleInput('UP')" ontouchstart="handleInput('UP')">W</button>
        <div></div>
        <button class="control-btn" onmousedown="handleInput('LEFT')" ontouchstart="handleInput('LEFT')">A</button>
        <button class="control-btn" onmousedown="handleInput('DOWN')" ontouchstart="handleInput('DOWN')">S</button>
        <button class="control-btn" onmousedown="handleInput('RIGHT')" ontouchstart="handleInput('RIGHT')">D</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const startBtn = document.getElementById('start-btn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let highScore = localStorage.getItem('cyberSnakeScore') || 0;
        highScoreElement.innerText = highScore;

        let snake = [];
        let food = { x: 5, y: 5 };
        let particles = [];
        let poisons = [];
        let bombs = [];
        let dx = 1, dy = 0;
        let nextDx = 1, nextDy = 0;
        let gameRunning = false;
        let gameLoop;
        let currentSpeed = 150;
        let frameCount = 0;
        let shakeFrames = 0;

        function initGame() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            poisons = [];
            bombs = [];
            particles = [];
            generateFood();
            score = 0;
            scoreElement.innerText = score;
            nextDx = 1; nextDy = 0;
            dx = 1; dy = 0;
            currentSpeed = 150;
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x * gridSize + gridSize/2,
                    y: y * gridSize + gridSize/2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1.0,
                    color: color
                });
            }
        }

        function generateFood() {
            let newX, newY;
            while (true) {
                newX = Math.floor(Math.random() * tileCount);
                newY = Math.floor(Math.random() * tileCount);
                if (!isOccupied(newX, newY)) {
                    food = { x: newX, y: newY };
                    break;
                }
            }
        }

        function isOccupied(x, y) {
            return snake.some(p => p.x === x && p.y === y) || 
                   (food.x === x && food.y === y) ||
                   poisons.some(p => p.x === x && p.y === y) ||
                   bombs.some(b => b.x === x && b.y === y);
        }

        function update() {
            frameCount++;
            dx = nextDx; dy = nextDy;
            
            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;

            if (nextX < 0) nextX = tileCount - 1;
            else if (nextX >= tileCount) nextX = 0;
            if (nextY < 0) nextY = tileCount - 1;
            else if (nextY >= tileCount) nextY = 0;

            const head = { x: nextX, y: nextY };

            if (snake.some(p => p.x === head.x && p.y === head.y)) return gameOver("NEURAL COLLISION");

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                createParticles(head.x, head.y, '#00ff88', 15);
                generateFood();
                shakeFrames = 5;
                if (currentSpeed > 50) currentSpeed -= 2;
            } else {
                let pIdx = poisons.findIndex(p => p.x === head.x && p.y === head.y);
                if (pIdx !== -1) {
                    poisons.splice(pIdx, 1);
                    score = Math.max(0, score - 5);
                    scoreElement.innerText = score;
                    createParticles(head.x, head.y, '#bc13fe', 10);
                    if (snake.length > 2) snake.pop();
                    snake.pop();
                    shakeFrames = 10;
                } else if (bombs.some(b => b.x === head.x && b.y === head.y)) {
                    return gameOver("CORE CRITICAL ERROR");
                } else {
                    snake.pop();
                }
            }

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });

            if (frameCount % 50 === 0) {
                if (Math.random() < 0.3 && poisons.length < 4) {
                    let x = Math.floor(Math.random() * tileCount);
                    let y = Math.floor(Math.random() * tileCount);
                    if (!isOccupied(x, y)) poisons.push({ x, y });
                }
                if (Math.random() < 0.2 && bombs.length < 2) {
                    let x = Math.floor(Math.random() * tileCount);
                    let y = Math.floor(Math.random() * tileCount);
                    if (!isOccupied(x, y)) bombs.push({ x, y });
                }
            }
        }

        function draw() {
            ctx.save();
            if (shakeFrames > 0) {
                ctx.translate((Math.random()-0.5)*7, (Math.random()-0.5)*7);
                shakeFrames--;
            }

            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#111122';
            ctx.lineWidth = 1;
            for(let i=0; i<=tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2, 2);
            });
            ctx.globalAlpha = 1.0;

            bombs.forEach(b => {
                const glow = Math.sin(Date.now() * 0.01) * 10 + 10;
                ctx.shadowBlur = glow;
                ctx.shadowColor = '#ff0066';
                ctx.fillStyle = '#ff0066';
                ctx.beginPath();
                ctx.arc(b.x*gridSize+10, b.y*gridSize+10, 7, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillRect(b.x*gridSize+8, b.y*gridSize+8, 4, 4);
                ctx.shadowBlur = 0;
            });

            poisons.forEach(p => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#bc13fe';
                ctx.fillStyle = '#bc13fe';
                ctx.beginPath();
                ctx.moveTo(p.x*gridSize+10, p.y*gridSize+4);
                ctx.lineTo(p.x*gridSize+16, p.y*gridSize+16);
                ctx.lineTo(p.x*gridSize+4, p.y*gridSize+16);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            const fGlow = Math.sin(Date.now() * 0.005) * 15 + 15;
            ctx.shadowBlur = fGlow;
            ctx.shadowColor = '#00d2ff';
            ctx.fillStyle = '#00d2ff';
            ctx.beginPath();
            ctx.arc(food.x*gridSize+10, food.y*gridSize+10, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            snake.forEach((part, i) => {
                const isHead = i === 0;
                const alpha = 1 - (i / snake.length * 0.8);
                ctx.shadowBlur = isHead ? 20 : 0;
                ctx.shadowColor = isHead ? '#00ff88' : 'transparent';
                ctx.fillStyle = isHead ? '#00ff88' : `rgba(0, 255, 136, ${alpha})`;
                const x = part.x * gridSize + 2;
                const y = part.y * gridSize + 2;
                const size = gridSize - 4;
                drawRoundedRect(ctx, x, y, size, size, isHead ? 6 : 4);
                ctx.fill();
                if (isHead) {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x+4, y+4, 3, 3);
                    ctx.fillRect(x+size-7, y+4, 3, 3);
                }
            });
            ctx.restore();
        }

        function drawRoundedRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
            ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
            ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
            ctx.closePath();
        }

        function startGame() {
            if (gameRunning) return;
            initGame();
            gameRunning = true;
            overlay.classList.add('hidden');
            if (gameLoop) clearTimeout(gameLoop);
            gameStep();
        }

        function gameStep() {
            if (!gameRunning) return;
            update();
            draw();
            gameLoop = setTimeout(gameStep, currentSpeed);
        }

        function gameOver(msg) {
            gameRunning = false;
            clearTimeout(gameLoop);
            overlay.classList.remove('hidden');
            overlayTitle.innerText = msg;
            overlayTitle.style.color = '#ff0066';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('cyberSnakeScore', highScore);
                highScoreElement.innerText = highScore;
            }
        }

        function handleInput(dir) {
            if (!gameRunning) return;
            switch(dir) {
                case 'UP': if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
                case 'DOWN': if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
                case 'LEFT': if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
                case 'RIGHT': if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
            }
        }

        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
            switch(e.key) {
                case 'ArrowUp': case 'w': handleInput('UP'); break;
                case 'ArrowDown': case 's': handleInput('DOWN'); break;
                case 'ArrowLeft': case 'a': handleInput('LEFT'); break;
                case 'ArrowRight': case 'd': handleInput('RIGHT'); break;
            }
        });

        startBtn.addEventListener('click', startGame);
        draw();
    </script>
</body>
</html>
