<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典塔防遊戲</title>
    <!-- 引入 Tailwind CSS 用於 UI 樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a202c; /* Tailwind gray-900 */
            color: #e2e8f0; /* Tailwind gray-200 */
            user-select: none;
            overflow: hidden; /* 防止滾動 */
        }
        #gameCanvas {
            background-color: #4ade80; /* 草地顏色 */
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            cursor: crosshair;
        }
        .tower-btn {
            transition: all 0.2s;
        }
        .tower-btn:hover {
            transform: translateY(-2px);
        }
        .tower-btn.selected {
            border-color: #fbbf24; /* Amber 400 */
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            background-color: #374151; /* Gray 700 */
        }
        /* 隱藏滾動條但保持可滾動 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3748; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #718096; 
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4">

    <!-- 遊戲主容器 -->
    <div class="flex flex-col md:flex-row gap-6 max-w-7xl w-full h-full max-h-[800px]">
        
        <!-- 左側：遊戲畫面區 -->
        <div class="flex-grow flex items-center justify-center relative">
            <canvas id="gameCanvas" width="800" height="600" class="max-w-full max-h-full object-contain"></canvas>
            
            <!-- 遊戲結束遮罩 -->
            <div id="gameOverScreen" class="absolute inset-0 bg-black bg-opacity-75 flex flex-col items-center justify-center rounded-lg hidden">
                <h1 class="text-6xl font-bold text-red-500 mb-4 drop-shadow-lg">遊戲結束</h1>
                <p id="finalScore" class="text-2xl mb-8">存活波數: 0</p>
                <button onclick="resetGame()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded shadow-lg transition-transform transform hover:scale-105">
                    重新開始
                </button>
            </div>

            <!-- 暫停遮罩 -->
            <div id="pauseScreen" class="absolute inset-0 bg-black bg-opacity-50 flex flex-col items-center justify-center rounded-lg hidden pointer-events-none z-10">
                <h1 class="text-6xl font-bold text-white mb-4 drop-shadow-lg tracking-widest">暫停</h1>
                <p class="text-xl text-gray-200">按 ESC 鍵繼續遊戲</p>
            </div>
        </div>

        <!-- 右側：控制面板 -->
        <div class="w-full md:w-80 bg-gray-800 rounded-xl p-5 flex flex-col gap-4 shadow-xl border border-gray-700 overflow-y-auto">
            <h1 class="text-2xl font-bold text-center border-b border-gray-600 pb-2">🏰 陣地防禦</h1>
            
            <!-- 狀態資訊 -->
            <div class="grid grid-cols-2 gap-4 text-lg">
                <div class="bg-gray-700 p-3 rounded-lg flex items-center gap-2">
                    <span class="text-red-400">❤️</span>
                    <span id="ui-lives" class="font-bold">20</span>
                </div>
                <div class="bg-gray-700 p-3 rounded-lg flex items-center gap-2">
                    <span class="text-yellow-400">💰</span>
                    <span id="ui-gold" class="font-bold">400</span>
                </div>
            </div>

            <!-- 波次資訊 -->
            <div class="bg-gray-700 p-4 rounded-lg text-center">
                <div class="text-sm text-gray-400">目前波數</div>
                <div id="ui-wave" class="text-3xl font-bold text-blue-400">1</div>
            </div>

            <button id="nextWaveBtn" onclick="startNextWave()" class="w-full py-3 bg-green-600 hover:bg-green-500 font-bold rounded-lg shadow transition-colors">
                ▶️ 呼叫下一波
            </button>

            <div class="border-t border-gray-600 my-2"></div>
            
            <h2 class="text-lg font-semibold text-gray-300">建構防禦塔</h2>
            <p class="text-sm text-gray-400 mb-2">點擊選擇，再點擊地圖空地建造</p>

            <!-- 防禦塔商店 -->
            <div class="flex flex-col gap-3" id="towerShop">
                <!-- 基礎塔 -->
                <button onclick="selectTower(0)" class="tower-btn border-2 border-transparent bg-gray-700 p-3 rounded-lg flex items-center justify-between text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-gray-400 border-2 border-gray-300 relative">
                            <div class="absolute inset-x-0 bottom-0 top-1/2 bg-black w-2 h-4 mx-auto"></div>
                        </div>
                        <div>
                            <div class="font-bold">基礎機槍塔</div>
                            <div class="text-xs text-gray-400">均衡的射速與傷害</div>
                        </div>
                    </div>
                    <div class="text-yellow-400 font-bold">50 💰</div>
                </button>

                <!-- 狙擊塔 -->
                <button onclick="selectTower(1)" class="tower-btn border-2 border-transparent bg-gray-700 p-3 rounded-lg flex items-center justify-between text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-blue-500 border-2 border-blue-300 relative">
                            <div class="absolute inset-x-0 bottom-0 top-1/4 bg-black w-1 h-6 mx-auto"></div>
                        </div>
                        <div>
                            <div class="font-bold">重型狙擊塔</div>
                            <div class="text-xs text-gray-400">超遠射程，高單發傷害</div>
                        </div>
                    </div>
                    <div class="text-yellow-400 font-bold">100 💰</div>
                </button>

                <!-- 速射塔 -->
                <button onclick="selectTower(2)" class="tower-btn border-2 border-transparent bg-gray-700 p-3 rounded-lg flex items-center justify-between text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-red-500 border-2 border-red-300 relative">
                            <div class="flex justify-center h-full pt-1 gap-1">
                                <div class="bg-black w-1 h-4"></div>
                                <div class="bg-black w-1 h-4"></div>
                            </div>
                        </div>
                        <div>
                            <div class="font-bold">雙管速射塔</div>
                            <div class="text-xs text-gray-400">極快射速，短距離</div>
                        </div>
                    </div>
                    <div class="text-yellow-400 font-bold">150 💰</div>
                </button>

                <!-- 冰霜塔 -->
                <button onclick="selectTower(3)" class="tower-btn border-2 border-transparent bg-gray-700 p-3 rounded-lg flex items-center justify-between text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-cyan-500 border-2 border-cyan-300 flex items-center justify-center relative">
                            <div class="w-4 h-4 bg-white rotate-45"></div>
                        </div>
                        <div>
                            <div class="font-bold text-cyan-300">極寒冰霜塔</div>
                            <div class="text-xs text-gray-400">造成小幅傷害並<span class="text-cyan-200">減速敵人</span></div>
                        </div>
                    </div>
                    <div class="text-yellow-400 font-bold">120 💰</div>
                </button>

                <!-- 加農砲 -->
                <button onclick="selectTower(4)" class="tower-btn border-2 border-transparent bg-gray-700 p-3 rounded-lg flex items-center justify-between text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-emerald-600 border-2 border-emerald-400 relative">
                            <div class="absolute inset-x-0 bottom-0 top-1/4 bg-black w-3 h-5 mx-auto"></div>
                        </div>
                        <div>
                            <div class="font-bold text-emerald-400">重型加農砲</div>
                            <div class="text-xs text-gray-400">發射爆裂彈，造成<span class="text-emerald-200">範圍傷害</span></div>
                        </div>
                    </div>
                    <div class="text-yellow-400 font-bold">250 💰</div>
                </button>

                <!-- 火焰塔 -->
                <button onclick="selectTower(5)" class="tower-btn border-2 border-transparent bg-gray-700 p-3 rounded-lg flex items-center justify-between text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-orange-500 border-2 border-orange-300 relative overflow-hidden">
                            <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-5 bg-yellow-400 rounded-t-full"></div>
                        </div>
                        <div>
                            <div class="font-bold text-orange-400">煉獄火焰塔</div>
                            <div class="text-xs text-gray-400">點燃敵人造成<span class="text-orange-300">持續燃燒傷害</span></div>
                        </div>
                    </div>
                    <div class="text-yellow-400 font-bold">200 💰</div>
                </button>
            </div>

            <!-- 拆除塔按鈕 -->
            <div class="border-t border-gray-600 my-2"></div>
            <button id="sellBtn" onclick="toggleSellMode()" class="w-full py-3 bg-red-800 hover:bg-red-700 text-white font-bold rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                <span>🔨</span> 拆除防禦塔 (退還 75%)
            </button>
            
            <div class="mt-auto pt-4 text-xs text-gray-500 text-center">
                提示: 點擊已建造的塔可查看射程。右鍵取消選擇。
            </div>
        </div>
    </div>

    <!-- 遊戲邏輯腳本 -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 遊戲常數與設定 ---
        const TILE_SIZE = 40;
        const COLS = 20; // 800px / 40px
        const ROWS = 15; // 600px / 40px

        // 動態地圖生成輔助函數
        function generatePathData(points) {
            let coords = [];
            let wps = [];
            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                wps.push({ x: p.c * TILE_SIZE + TILE_SIZE/2, y: p.r * TILE_SIZE + TILE_SIZE/2 });
                if (i > 0) {
                    let prev = points[i-1];
                    let dc = prev.c === p.c ? 0 : Math.sign(p.c - prev.c);
                    let dr = prev.r === p.r ? 0 : Math.sign(p.r - prev.r);
                    let c = prev.c;
                    let r = prev.r;
                    while (c !== p.c || r !== p.r) {
                        if (c >= 0 && c < COLS && r >= 0 && r < ROWS) coords.push({c, r});
                        c += dc;
                        r += dr;
                    }
                }
            }
            let last = points[points.length-1];
            if (last.c >= 0 && last.c < COLS && last.r >= 0 && last.r < ROWS) coords.push({c: last.c, r: last.r});
            return { coords, waypoints: wps };
        }

        // 定義不同的地圖階段
        const MAP_CONFIGS = [
            // 第一階段 (1-10波): 經典簡單路徑
            generatePathData([{c:-1, r:2}, {c:4, r:2}, {c:4, r:10}, {c:14, r:10}, {c:14, r:4}, {c:20, r:4}]),
            // 第二階段 (11-20波): S型多重彎道
            generatePathData([{c:-1, r:1}, {c:17, r:1}, {c:17, r:7}, {c:2, r:7}, {c:2, r:13}, {c:20, r:13}]),
            // 第三階段 (21波起): 死亡螺旋迷宮
            generatePathData([{c:9, r:-1}, {c:9, r:13}, {c:18, r:13}, {c:18, r:2}, {c:1, r:2}, {c:1, r:10}, {c:14, r:10}, {c:14, r:4}, {c:4, r:4}, {c:4, r:7}, {c:-1, r:7}])
        ];

        let pathCoords = [];
        let waypoints = [];

        function loadMap(index) {
            let conf = MAP_CONFIGS[index % MAP_CONFIGS.length];
            pathCoords = conf.coords;
            waypoints = conf.waypoints;
            initGrid();
        }

        // 防禦塔類型資料表
        const TOWER_TYPES = [
            { name: '機槍塔', cost: 50, range: 120, damage: 20, cooldown: 45, color: '#9ca3af', baseColor: '#4b5563', projSpeed: 8, projColor: '#fcd34d' },
            { name: '狙擊塔', cost: 100, range: 300, damage: 100, cooldown: 120, color: '#3b82f6', baseColor: '#1e3a8a', projSpeed: 15, projColor: '#60a5fa' },
            { name: '速射塔', cost: 150, range: 90, damage: 12, cooldown: 12, color: '#ef4444', baseColor: '#7f1d1d', projSpeed: 10, projColor: '#fca5a5' },
            { name: '冰霜塔', cost: 120, range: 110, damage: 5, cooldown: 40, color: '#22d3ee', baseColor: '#0891b2', projSpeed: 9, projColor: '#cffafe', special: 'ice' },
            { name: '重型加農砲', cost: 250, range: 140, damage: 45, cooldown: 90, color: '#10b981', baseColor: '#064e3b', projSpeed: 5, projColor: '#059669', special: 'aoe', aoeRadius: 70 },
            { name: '火焰塔', cost: 200, range: 100, damage: 8, cooldown: 30, color: '#f97316', baseColor: '#9a3412', projSpeed: 12, projColor: '#fde047', special: 'burn' }
        ];

        // --- 遊戲狀態 ---
        let state = {
            gold: 400, // 增加初始資金
            lives: 20,
            wave: 0,
            mapIndex: 0,
            enemies: [],
            towers: [],
            projectiles: [],
            particles: [],
            floatingTexts: [],
            grid: [],
            isGameOver: false,
            isPaused: false,
            sellMode: false, // 拆除模式
            waveQueue: [],
            spawnTimer: 0,
            selectedTowerIdx: -1,
            hoverX: -1,
            hoverY: -1,
            lastFrameTime: 0
        };

        // UI 元素參考
        const uiGold = document.getElementById('ui-gold');
        const uiLives = document.getElementById('ui-lives');
        const uiWave = document.getElementById('ui-wave');
        const nextWaveBtn = document.getElementById('nextWaveBtn');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const pauseScreen = document.getElementById('pauseScreen');
        const finalScore = document.getElementById('finalScore');
        const towerBtns = document.querySelectorAll('.tower-btn');
        const sellBtn = document.getElementById('sellBtn');

        // --- 初始化網格 ---
        function initGrid() {
            state.grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            // 標記路徑為 1，不可建塔
            for (let pt of pathCoords) {
                if (pt.c >= 0 && pt.c < COLS && pt.r >= 0 && pt.r < ROWS) {
                    state.grid[pt.r][pt.c] = 1;
                }
            }
        }

        // --- 類別定義 ---

        class Enemy {
            constructor(config) {
                this.x = waypoints[0].x; // 從第一個航點開始(已包含螢幕外偏移)
                this.y = waypoints[0].y;
                this.hp = config.hp;
                this.maxHp = config.hp;
                this.speed = config.speed;
                this.reward = config.reward;
                this.targetIndex = 0;
                this.hitTimer = 0; // 受擊閃白效果
                this.freezeTimer = 0; // 冰凍減速效果
                this.burnTimer = 0; // 燃燒持續傷害效果
                this.radius = config.radius || 14;
                this.color = config.color || '#ec4899';
            }

            update() {
                if (this.hitTimer > 0) this.hitTimer--;

                // 燃燒效果邏輯
                if (this.burnTimer > 0) {
                    this.burnTimer--;
                    if (this.burnTimer % 20 === 0) { // 每 1/3 秒(約20 frames)扣一次血
                        let killed = this.takeDamage(3);
                        if (killed) return false; // 被燒死了，移除此敵人
                    }
                }

                let currentSpeed = this.speed;
                if (this.freezeTimer > 0) {
                    this.freezeTimer--;
                    currentSpeed *= 0.5; // 減速 50%
                }

                let target = waypoints[this.targetIndex];
                let dx = target.x - this.x;
                let dy = target.y - this.y;
                let dist = Math.hypot(dx, dy);

                if (dist < currentSpeed) {
                    this.x = target.x;
                    this.y = target.y;
                    this.targetIndex++;
                    if (this.targetIndex >= waypoints.length) {
                        // 抵達終點，扣減生命
                        state.lives--;
                        updateUI();
                        if (state.lives <= 0) gameOver();
                        return false; // 需要被移除
                    }
                } else {
                    this.x += (dx / dist) * currentSpeed;
                    this.y += (dy / dist) * currentSpeed;
                }
                return true; // 繼續存活
            }

            draw(ctx) {
                // 陰影
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(this.x + 2, this.y + 4, this.radius - 2, 0, Math.PI * 2);
                ctx.fill();

                // 身體
                ctx.fillStyle = this.hitTimer > 0 ? '#ffffff' : (this.freezeTimer > 0 ? '#67e8f9' : this.color); // 閃白、冰凍藍或原色
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#831843';
                if (this.freezeTimer > 0) ctx.strokeStyle = '#0891b2'; // 冰凍時邊框變藍
                if (this.burnTimer > 0) ctx.strokeStyle = '#f97316'; // 燃燒時邊框變橘
                ctx.lineWidth = 2;
                ctx.stroke();

                // 燃燒視覺特效
                if (this.burnTimer > 0 && Math.random() < 0.5) {
                    state.particles.push(new Particle(this.x + (Math.random() - 0.5) * 20, this.y - 10, '#f97316', 0, -1, 3, 0.2, 3));
                    state.particles.push(new Particle(this.x + (Math.random() - 0.5) * 10, this.y - 15, '#fbbf24', 0, -1.5, 2, 0.2, 2));
                }

                // 血條
                const hpPercent = this.hp / this.maxHp;
                const barWidth = this.radius * 2.5;
                const barY = this.y - this.radius - 8;
                ctx.fillStyle = '#ef4444'; // 紅底
                ctx.fillRect(this.x - barWidth / 2, barY, barWidth, 5);
                ctx.fillStyle = '#22c55e'; // 綠血
                ctx.fillRect(this.x - barWidth / 2, barY, barWidth * hpPercent, 5);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x - barWidth / 2, barY, barWidth, 5);
            }

            takeDamage(amount) {
                this.hp -= amount;
                this.hitTimer = 3;
                if (this.hp <= 0) {
                    state.gold += this.reward;
                    updateUI();
                    // 死亡特效與跳錢
                    createExplosion(this.x, this.y, this.color);
                    state.floatingTexts.push(new FloatingText(`+${this.reward}`, this.x, this.y, '#fbbf24'));
                    return true; // 代表死亡
                }
                return false;
            }
        }

        class Boss extends Enemy {
            constructor(config) {
                super(config);
                this.radius = 26;
                this.color = '#7f1d1d'; // 深紅色
                this.summonTimer = 0;
            }
            
            update() {
                let isAlive = super.update();
                
                // 召喚小怪技能
                if (isAlive) {
                    this.summonTimer++;
                    if (this.summonTimer >= 180) { // 每 3 秒 (180 frames) 召喚一次
                        this.summonTimer = 0;
                        
                        // 生成一個血量較低的高速小怪
                        let summonConfig = getEnemyConfig('fast', this.maxHp * 0.1, this.speed * 1.5, Math.max(1, Math.floor(this.reward * 0.05)));
                        let minion = new Enemy(summonConfig);
                        
                        // 讓小怪從 Boss 當前位置出現
                        minion.x = this.x;
                        minion.y = this.y;
                        minion.targetIndex = this.targetIndex; // 繼承 Boss 的路徑進度
                        
                        // 給予獨特的綠色作為召喚物的標記
                        minion.color = '#22c55e';
                        minion.radius = 10;
                        
                        state.enemies.push(minion);
                        createParticles(this.x, this.y, '#22c55e', 8, 2); // 召喚特效
                    }
                }
                return isAlive;
            }

            draw(ctx) {
                // Boss 專屬跳動光環
                ctx.fillStyle = 'rgba(220, 38, 38, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 8 + Math.sin(Date.now() / 150) * 4, 0, Math.PI * 2);
                ctx.fill();

                // 呼叫父類別的基本繪製 (陰影、身體、血條)
                super.draw(ctx);

                // 覆蓋身體加上核心特效
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }

            takeDamage(amount) {
                let died = super.takeDamage(amount);
                if (died) {
                    // Boss 死亡連續大爆炸特效
                    createExplosion(this.x, this.y, '#ef4444');
                    setTimeout(() => createExplosion(this.x + 15, this.y - 15, '#fbbf24'), 100);
                    setTimeout(() => createExplosion(this.x - 15, this.y + 15, '#f97316'), 200);
                    setTimeout(() => createExplosion(this.x, this.y, '#ffffff'), 300);
                }
                return died;
            }
        }

        class Tower {
            constructor(c, r, typeIdx) {
                this.c = c;
                this.r = r;
                this.x = c * TILE_SIZE + TILE_SIZE / 2;
                this.y = r * TILE_SIZE + TILE_SIZE / 2;
                this.type = TOWER_TYPES[typeIdx];
                this.cooldownTimer = 0;
                this.angle = 0;
            }

            update() {
                if (this.cooldownTimer > 0) this.cooldownTimer--;

                // 尋找目標 (範圍內最前面的敵人)
                let target = null;
                let maxProgress = -1;

                for (let e of state.enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist <= this.type.range) {
                        // 簡單進度計算：已走過的路徑點數量 + 當前點進度
                        let progress = e.targetIndex * 1000 - dist; 
                        if (progress > maxProgress) {
                            maxProgress = progress;
                            target = e;
                        }
                    }
                }

                if (target) {
                    // 瞄準
                    this.angle = Math.atan2(target.y - this.y, target.x - this.x);
                    
                    // 射擊
                    if (this.cooldownTimer <= 0) {
                        this.shoot(target);
                        this.cooldownTimer = this.type.cooldown;
                    }
                }
            }

            shoot(target) {
                // 預測位置 (簡單版)
                let tx = target.x + (target.x - target.x)*0.5;
                let ty = target.y + (target.y - target.y)*0.5;
                state.projectiles.push(new Projectile(this.x, this.y, target, this.type));
                
                // 槍口火光特效
                createParticles(this.x + Math.cos(this.angle)*15, this.y + Math.sin(this.angle)*15, '#fbbf24', 3, 2);
            }

            draw(ctx) {
                // 底座
                ctx.fillStyle = this.type.baseColor;
                ctx.fillRect(this.x - 16, this.y - 16, 32, 32);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x - 16, this.y - 16, 32, 32);

                // 砲塔旋轉
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 砲管
                ctx.fillStyle = '#111827';
                if (this.type.name === '速射塔') {
                    ctx.fillRect(0, -8, 20, 4);
                    ctx.fillRect(0, 4, 20, 4);
                } else if (this.type.name === '狙擊塔') {
                    ctx.fillRect(0, -3, 28, 6);
                } else if (this.type.name === '重型加農砲') {
                    ctx.fillRect(0, -6, 22, 12); // 更粗的砲管
                } else if (this.type.name === '冰霜塔') {
                    ctx.fillRect(0, -4, 15, 8); // 略短的砲管
                } else if (this.type.name === '火焰塔') {
                    ctx.fillStyle = '#7c2d12'; // 棕紅色砲管
                    ctx.fillRect(0, -7, 18, 14); 
                } else {
                    ctx.fillRect(0, -4, 18, 8);
                }

                // 砲台主體
                ctx.fillStyle = this.type.color;
                ctx.beginPath();
                if (this.type.name === '冰霜塔') {
                    ctx.moveTo(12, 0); // 繪製菱形水晶形狀
                    ctx.lineTo(0, 12);
                    ctx.lineTo(-12, 0);
                    ctx.lineTo(0, -12);
                    ctx.closePath();
                } else if (this.type.name === '重型加農砲') {
                    ctx.arc(0, 0, 12, 0, Math.PI * 2); // 更大的圓形
                } else if (this.type.name === '火焰塔') {
                    ctx.arc(0, 0, 11, 0, Math.PI * 2);
                } else {
                    ctx.arc(0, 0, 10, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.stroke();

                // 火焰塔額外內核裝飾
                if (this.type.name === '火焰塔') {
                    ctx.fillStyle = '#fde047';
                    ctx.beginPath();
                    ctx.arc(0, 0, 5, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, target, towerType) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.damage = towerType.damage;
                this.speed = towerType.projSpeed;
                this.color = towerType.projColor;
                this.special = towerType.special; // 取得特殊能力 (如 ice, aoe)
                this.aoeRadius = towerType.aoeRadius; // AOE 範圍
                // 記錄目標最後位置以防目標死亡
                this.lastTargetX = target.x;
                this.lastTargetY = target.y;
            }

            update() {
                // 如果目標還活著，更新追蹤位置
                if (state.enemies.includes(this.target)) {
                    this.lastTargetX = this.target.x;
                    this.lastTargetY = this.target.y;
                }

                let dx = this.lastTargetX - this.x;
                let dy = this.lastTargetY - this.y;
                let dist = Math.hypot(dx, dy);

                if (dist < this.speed) {
                    // 擊中
                    if (this.special === 'aoe') {
                        // 範圍傷害邏輯
                        createExplosion(this.x, this.y, this.color); // 中心爆炸
                        createParticles(this.x, this.y, '#f59e0b', 10, 5); // 額外火花
                        
                        // 尋找範圍內的敵人
                        let enemiesToDamage = state.enemies.filter(e => {
                            let edist = Math.hypot(e.x - this.x, e.y - this.y);
                            return edist <= this.aoeRadius;
                        });

                        enemiesToDamage.forEach(e => {
                            let killed = e.takeDamage(this.damage);
                            if (killed) {
                                state.enemies = state.enemies.filter(en => en !== e);
                            }
                        });
                        
                        // 畫一個短暫的爆炸範圍圈 (利用一個擴展粒子)
                        state.particles.push(new Particle(this.x, this.y, 'rgba(16, 185, 129, 0.3)', 0, 0, 10, 0.5, this.aoeRadius));

                    } else {
                        // 單體傷害邏輯
                        if (state.enemies.includes(this.target)) {
                            let killed = this.target.takeDamage(this.damage);
                            
                            // 冰凍特效
                            if (this.special === 'ice') {
                                this.target.freezeTimer = 120; // 冰凍 2 秒 (120 frames)
                            }
                            // 燃燒特效
                            if (this.special === 'burn') {
                                this.target.burnTimer = 180; // 燃燒 3 秒 (180 frames)
                            }
                            
                            if (killed) {
                                state.enemies = state.enemies.filter(e => e !== this.target);
                            }
                        }
                        createParticles(this.x, this.y, this.color, 5, 2);
                    }
                    return false; // 移除子彈
                }

                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
                
                // 殘影特效
                if (Math.random() < 0.3) {
                     state.particles.push(new Particle(this.x, this.y, this.color, 0, 0, 3, 0.1));
                }

                return true;
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- 特效類別 ---
        class Particle {
            constructor(x, y, color, vx, vy, life, fadeRate, radius = 2) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.life = life;
                this.maxLife = life;
                this.fadeRate = fadeRate || 0.05;
                this.baseRadius = radius;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.fadeRate;
                return this.life > 0;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // 如果 baseRadius 較大(如AOE特效)，半徑會隨生命週期稍微縮小
                let r = this.baseRadius > 5 ? this.baseRadius * (this.life / this.maxLife) : this.baseRadius + this.life;
                ctx.arc(this.x, this.y, Math.max(0, r), 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class FloatingText {
            constructor(text, x, y, color) {
                this.text = text;
                this.x = x;
                this.y = y;
                this.color = color;
                this.life = 1.0;
            }
            update() {
                this.y -= 0.5; // 向上飄
                this.life -= 0.02;
                return this.life > 0;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                // 文字描邊
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeText(this.text, this.x, this.y);
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        // --- 輔助函數 ---
        function createParticles(x, y, color, count, speed) {
            for(let i=0; i<count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let v = Math.random() * speed;
                state.particles.push(new Particle(x, y, color, Math.cos(angle)*v, Math.sin(angle)*v, 3 + Math.random()*2, 0.1));
            }
        }

        function createExplosion(x, y, color) {
            createParticles(x, y, color, 15, 3);
            createParticles(x, y, '#ffffff', 5, 4);
        }

        function updateUI() {
            uiGold.innerText = state.gold;
            uiLives.innerText = state.lives;
            if (state.wave % 5 === 0 && state.wave > 0) {
                uiWave.innerHTML = `<span class="text-red-500">${state.wave} <br><span class="text-xl drop-shadow-md">BOSS 波</span></span>`;
            } else {
                uiWave.innerText = state.wave;
            }
        }

        // --- 互動邏輯 ---

        // 切換拆除模式
        function toggleSellMode() {
            state.sellMode = !state.sellMode;
            if (state.sellMode) {
                selectTower(-1); // 進入拆除模式時，取消建造
                sellBtn.classList.replace('bg-red-800', 'bg-red-500');
                sellBtn.classList.add('ring-4', 'ring-red-400');
            } else {
                sellBtn.classList.replace('bg-red-500', 'bg-red-800');
                sellBtn.classList.remove('ring-4', 'ring-red-400');
            }
        }

        function selectTower(index) {
            // 如果正在拆除模式，自動關閉
            if (state.sellMode && index !== -1) {
                toggleSellMode();
            }

            if (state.selectedTowerIdx === index) {
                state.selectedTowerIdx = -1; // 取消選擇
            } else {
                state.selectedTowerIdx = index;
            }
            
            // 更新按鈕視覺
            towerBtns.forEach((btn, i) => {
                if (i === state.selectedTowerIdx) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
        }

        // 滑鼠移動追蹤 (用於顯示游標與預覽)
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // 處理縮放比例
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let x = (e.clientX - rect.left) * scaleX;
            let y = (e.clientY - rect.top) * scaleY;
            
            state.hoverX = Math.floor(x / TILE_SIZE);
            state.hoverY = Math.floor(y / TILE_SIZE);
        });

        canvas.addEventListener('mouseleave', () => {
            state.hoverX = -1;
            state.hoverY = -1;
        });

        // 點擊事件 (建造塔、查看資訊、或拆除塔)
        canvas.addEventListener('click', () => {
            if (state.isGameOver || state.isPaused) return;
            if (state.hoverX < 0 || state.hoverX >= COLS || state.hoverY < 0 || state.hoverY >= ROWS) return;

            let c = state.hoverX;
            let r = state.hoverY;

            // 如果處於「拆除模式」
            if (state.sellMode) {
                if (state.grid[r][c] === 2) {
                    let towerIndex = state.towers.findIndex(t => t.c === c && t.r === r);
                    if (towerIndex !== -1) {
                        let t = state.towers[towerIndex];
                        let refundAmount = Math.floor(t.type.cost * 0.75); // 退還 75% 費用
                        
                        // 執行拆除
                        state.gold += refundAmount;
                        state.grid[r][c] = 0; // 重置網格狀態為空地
                        state.towers.splice(towerIndex, 1);
                        updateUI();

                        // 特效
                        createParticles(t.x, t.y, '#fbbf24', 15, 4);
                        state.floatingTexts.push(new FloatingText(`+${refundAmount} 💰`, t.x, t.y - 10, '#4ade80'));
                    }
                }
                return; // 執行完拆除就不做其他事了
            }

            // 檢查是否選擇了塔
            if (state.selectedTowerIdx !== -1) {
                let towerType = TOWER_TYPES[state.selectedTowerIdx];
                
                // 檢查是否可以建造 (網格為空且有足夠金錢)
                if (state.grid[r][c] === 0 && state.gold >= towerType.cost) {
                    state.gold -= towerType.cost;
                    state.towers.push(new Tower(c, r, state.selectedTowerIdx));
                    state.grid[r][c] = 2; // 標記為已有建築
                    updateUI();
                    
                    // 移除自動取消選擇，讓玩家可以連續建造
                    // selectTower(-1); 
                } else if (state.gold < towerType.cost) {
                    // 顯示金錢不足提示
                    state.floatingTexts.push(new FloatingText("金錢不足!", c*TILE_SIZE+20, r*TILE_SIZE, '#ef4444'));
                }
            }
        });

        // 阻止右鍵選單以允許右鍵取消選擇
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            selectTower(-1);
            if (state.sellMode) toggleSellMode(); // 右鍵也取消拆除模式
        });

        // ESC 暫停遊戲功能
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !state.isGameOver) {
                state.isPaused = !state.isPaused;
                if (state.isPaused) {
                    pauseScreen.classList.remove('hidden');
                } else {
                    pauseScreen.classList.add('hidden');
                }
            }
        });

        // 取得敵人設定檔 (增加多樣性)
        function getEnemyConfig(type, baseHp, baseSpeed, baseReward) {
            let conf = { hp: baseHp, speed: baseSpeed, reward: baseReward, radius: 14, color: '#ec4899' };
            switch(type) {
                case 'fast': 
                    conf.hp *= 0.5; conf.speed *= 1.8; conf.color = '#eab308'; conf.radius = 12; break; // 黃色快速
                case 'tank':
                    conf.hp *= 3; conf.speed *= 0.6; conf.color = '#64748b'; conf.radius = 18; conf.reward *= 2; break; // 灰色重甲 (金幣x2)
                case 'swarm':
                    // 確保蟲群殺死也有基本的保底金幣
                    conf.hp *= 0.25; conf.speed *= 1.2; conf.color = '#84cc16'; conf.radius = 10; conf.reward = Math.max(2, Math.floor(baseReward * 0.25)); break; // 進一步下調蟲群獎勵
                case 'miniboss':
                    conf.hp *= 2.5; conf.speed *= 0.8; conf.color = '#9333ea'; conf.radius = 18; conf.reward *= 4; break; // 紫色小王 (金幣x4)
                case 'normal':
                default:
                    conf.reward = Math.max(3, Math.floor(baseReward * 0.7)); // 稍微下調普通小怪的基礎獎勵
                    break;
            }
            return conf;
        }

        // --- 遊戲波次控制 ---
        function startNextWave() {
            if (state.isGameOver) return;
            if (state.waveQueue.length > 0) return; // 還有敵人在排隊
            
            state.wave++;

            // 每 10 波切換地圖 (波數 11, 21, 31...)
            if (state.wave > 1 && (state.wave - 1) % 10 === 0) {
                // 退還所有塔的金錢
                let refund = state.towers.reduce((sum, t) => sum + t.type.cost, 0);
                state.gold += refund;
                state.towers = [];
                state.projectiles = [];
                state.particles = [];
                state.mapIndex++;
                loadMap(state.mapIndex);
                
                state.floatingTexts.push(new FloatingText("地圖重置！進入更危險的新區域！", canvas.width/2, canvas.height/2, '#ef4444'));
                if (refund > 0) {
                    state.floatingTexts.push(new FloatingText(`已回收防禦塔資金: +${refund} 💰`, canvas.width/2, canvas.height/2 + 30, '#4ade80'));
                }
            }

            updateUI();
            
            // 波次難度曲線設定
            let count = 5 + Math.floor(state.wave * 1.5);
            // 隨時間敵人血量與速度成長變得更加劇烈
            let hp = 40 + Math.pow(state.wave, 1.4) * 25; 
            let speed = 1.0 + (state.wave * 0.08); 
            
            // 💰 獎勵增長幅度降低
            let reward = 10 + Math.floor(state.wave * 1.5);

            let isBossWave = state.wave % 5 === 0;

            if (isBossWave) {
                // 顯示 Boss 警告動畫
                state.floatingTexts.push(new FloatingText(`⚠️ 第 ${state.wave} 波 BOSS 來襲! ⚠️`, canvas.width/2, canvas.height/2 - 50, '#ef4444'));
                
                // Boss 波次：先出少量小兵，最後出 Boss
                // Boss 波的小怪也變得更強
                let bossMinionHp = hp * 1.5; 
                for (let i = 0; i < count - 3; i++) {
                    state.waveQueue.push({ ...getEnemyConfig('normal', bossMinionHp, speed * 1.1, reward), type: 'normal' });
                }
                
                // Boss 屬性大幅強化 (微調下修血量)
                let bossHp = hp * 10 + Math.pow(state.wave, 1.5) * 150; // 稍微減少 Boss 的血量成長倍率
                let bossSpeed = speed * 0.7; // Boss 移動稍微變快一點(原本0.6)
                let bossReward = reward * 20; 
                state.waveQueue.push({ hp: bossHp, speed: bossSpeed, reward: bossReward, type: 'boss' });
                
            } else {
                // 一般波次：根據波次決定敵人組合
                let waveType = 'normal';
                let waveMod = state.wave % 10;
                if (waveMod === 3 || waveMod === 7) waveType = 'fast'; // 偶爾出現高速敵人
                else if (waveMod === 4 || waveMod === 8) waveType = 'tank'; // 偶爾出現重甲敵人
                else if (waveMod === 9) waveType = 'swarm'; // Boss前一波是海量蟲群

                if (waveType === 'swarm') count = Math.floor(count * 2.5);

                for (let i = 0; i < count; i++) {
                    let isMiniBoss = (waveType !== 'swarm' && i % 5 === 4);
                    let eType = isMiniBoss ? 'miniboss' : waveType;
                    
                    let conf = getEnemyConfig(eType, hp, speed, reward);
                    state.waveQueue.push({ ...conf, type: eType });
                }
            }

            // 禁用按鈕直到這波出完
            nextWaveBtn.disabled = true;
            nextWaveBtn.classList.add('opacity-50', 'cursor-not-allowed');
            nextWaveBtn.innerText = "敵人進軍中...";
        }

        // --- 主要遊戲迴圈 ---

        function update() {
            if (state.isGameOver) return;

            // 產生敵人
            if (state.waveQueue.length > 0) {
                state.spawnTimer--;
                if (state.spawnTimer <= 0) {
                    let eData = state.waveQueue.shift();
                    
                    if (eData.type === 'boss') {
                        state.enemies.push(new Boss(eData));
                        state.spawnTimer = 150; // Boss 後面留多點空隙
                    } else {
                        state.enemies.push(new Enemy(eData));
                        state.spawnTimer = eData.type === 'swarm' ? 20 : 60; // 蟲群生很快，其餘約1秒
                    }
                    
                    if (state.waveQueue.length === 0) {
                        nextWaveBtn.disabled = false;
                        nextWaveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        nextWaveBtn.innerHTML = "▶️ 呼叫下一波";
                    }
                }
            }

            // 更新敵人
            state.enemies = state.enemies.filter(e => e.update());

            // 更新塔
            state.towers.forEach(t => t.update());

            // 更新子彈
            state.projectiles = state.projectiles.filter(p => p.update());

            // 更新特效
            state.particles = state.particles.filter(p => p.update());
            state.floatingTexts = state.floatingTexts.filter(t => t.update());
        }

        function drawMap() {
            // 背景草地
            ctx.fillStyle = '#4ade80'; // 淺綠
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 裝飾性草叢圖案
            ctx.fillStyle = '#22c55e'; // 深一點的綠
            for(let r=0; r<ROWS; r++){
                for(let c=0; c<COLS; c++){
                    if ((c+r)%3===0 && state.grid[r][c] === 0) {
                        ctx.beginPath();
                        ctx.arc(c*TILE_SIZE + 10, r*TILE_SIZE + 10, 3, 0, Math.PI*2);
                        ctx.arc(c*TILE_SIZE + 15, r*TILE_SIZE + 8, 4, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }

            // 繪製泥土路徑
            ctx.strokeStyle = '#d2b48c'; // 泥土色
            ctx.lineWidth = 32;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            if (waypoints.length > 0) {
                ctx.moveTo(waypoints[0].x, waypoints[0].y);
                for (let i = 1; i < waypoints.length; i++) {
                    ctx.lineTo(waypoints[i].x, waypoints[i].y);
                }
                ctx.stroke();
            }

            // 路徑邊界裝飾
            ctx.strokeStyle = '#b89970';
            ctx.lineWidth = 36;
            ctx.globalCompositeOperation = 'destination-over'; // 畫在泥土下面
            ctx.beginPath();
            if (waypoints.length > 0) {
                ctx.moveTo(waypoints[0].x, waypoints[0].y);
                for (let i = 1; i < waypoints.length; i++) {
                    ctx.lineTo(waypoints[i].x, waypoints[i].y);
                }
                ctx.stroke();
            }
            ctx.globalCompositeOperation = 'source-over'; // 恢復正常
        }

        function drawUI() {
            // 1. 拆除模式預覽 (紅十字)
            if (state.sellMode && state.hoverX >= 0 && state.hoverY >= 0 && state.grid[state.hoverY][state.hoverX] === 2) {
                let cx = state.hoverX * TILE_SIZE + TILE_SIZE/2;
                let cy = state.hoverY * TILE_SIZE + TILE_SIZE/2;
                
                // 畫紅底色塊
                ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
                ctx.fillRect(cx - TILE_SIZE/2, cy - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                
                // 畫打叉
                ctx.strokeStyle = '#fca5a5';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(cx - 10, cy - 10);
                ctx.lineTo(cx + 10, cy + 10);
                ctx.moveTo(cx + 10, cy - 10);
                ctx.lineTo(cx - 10, cy + 10);
                ctx.stroke();
            } 
            // 2. 建造預覽
            else if (state.selectedTowerIdx !== -1 && state.hoverX >= 0 && state.hoverY >= 0) {
                let cx = state.hoverX * TILE_SIZE + TILE_SIZE/2;
                let cy = state.hoverY * TILE_SIZE + TILE_SIZE/2;
                let tType = TOWER_TYPES[state.selectedTowerIdx];
                
                // 檢查是否可放置
                let canPlace = state.grid[state.hoverY][state.hoverX] === 0 && state.gold >= tType.cost;
                
                // 射程圓圈
                ctx.beginPath();
                ctx.arc(cx, cy, tType.range, 0, Math.PI*2);
                ctx.fillStyle = canPlace ? 'rgba(255, 255, 255, 0.2)' : 'rgba(239, 68, 68, 0.2)'; // 白/紅
                ctx.fill();
                ctx.strokeStyle = canPlace ? 'rgba(255, 255, 255, 0.5)' : 'rgba(239, 68, 68, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // 塔的半透明預覽
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = canPlace ? tType.baseColor : '#ef4444';
                ctx.fillRect(cx - 16, cy - 16, 32, 32);
                ctx.beginPath();
                ctx.arc(cx, cy, 10, 0, Math.PI*2);
                ctx.fillStyle = tType.color;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            } 
            // 3. 查看已建好防禦塔的射程
            else if (state.hoverX >= 0 && state.hoverY >= 0 && state.grid[state.hoverY][state.hoverX] === 2) {
                let t = state.towers.find(t => t.c === state.hoverX && t.r === state.hoverY);
                if (t) {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.type.range, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawMap();
            
            // 依序繪製物件
            state.towers.forEach(t => t.draw(ctx));
            state.enemies.forEach(e => e.draw(ctx));
            state.projectiles.forEach(p => p.draw(ctx));
            state.particles.forEach(p => p.draw(ctx));
            state.floatingTexts.forEach(t => t.draw(ctx));
            
            drawUI();
        }

        function gameLoop(timestamp) {
            if (!state.isPaused) {
                update();
            }
            draw();
            
            if (!state.isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        function gameOver() {
            state.isGameOver = true;
            finalScore.innerText = `存活波數: ${state.wave}`;
            gameOverScreen.classList.remove('hidden');
        }

        function resetGame() {
            state = {
                gold: 400, // 初始給更多，方便佈局
                lives: 20,
                wave: 0,
                mapIndex: 0,
                enemies: [],
                towers: [],
                projectiles: [],
                particles: [],
                floatingTexts: [],
                grid: [],
                isGameOver: false,
                isPaused: false,
                sellMode: false,
                waveQueue: [],
                spawnTimer: 0,
                selectedTowerIdx: -1,
                hoverX: -1,
                hoverY: -1
            };
            
            loadMap(state.mapIndex); // 初始化地圖並更新網格
            updateUI();
            selectTower(-1);
            
            // 重置按鈕狀態
            sellBtn.classList.replace('bg-red-500', 'bg-red-800');
            sellBtn.classList.remove('ring-4', 'ring-red-400');

            gameOverScreen.classList.add('hidden');
            pauseScreen.classList.add('hidden');
            nextWaveBtn.disabled = false;
            nextWaveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextWaveBtn.innerHTML = "▶️ 呼叫第一波";
            
            if (!state.loopStarted) {
                state.loopStarted = true;
                requestAnimationFrame(gameLoop);
            }
        }

        // --- 啟動遊戲 ---
        window.onload = () => {
            resetGame(); // 初始化並啟動迴圈
        };

    </script>
</body>
</html>
