<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉筆戰場：繪製與裝填 II (極速版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Roboto', sans-serif;
            user-select: none;
        }

        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-element {
            text-shadow: 2px 2px 0 #000;
        }

        #ammo-counter {
            font-family: 'Permanent Marker', cursive;
            font-size: 3rem;
            color: #eee;
        }

        #interaction-prompt {
            position: absolute;
            left: 50%;
            top: 60%;
            transform: translateX(-50%);
            font-family: 'Permanent Marker', cursive;
            font-size: 1.5rem;
            color: #fbbf24;
            display: none;
            text-align: center;
        }

        /* Recognition Result Text */
        #recog-result {
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            font-family: 'Permanent Marker', cursive;
            font-size: 2rem;
            color: #fff;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            pointer-events: none;
        }
        
        .hint-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1px solid #aaa;
            margin: 0 5px;
            vertical-align: middle;
        }

        #main-menu, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 4rem;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 4px 4px 0 #3b82f6;
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: 'Permanent Marker', cursive;
            margin: 10px;
            cursor: pointer;
            transition: transform 0.1s;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        .btn:hover {
            transform: scale(1.1) rotate(-1deg);
            background: #fbbf24;
        }

        .team-select-btn {
            width: 200px;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD Layer -->
    <div id="game-ui">
        <div class="flex justify-between w-full">
            <div class="hud-element text-white text-xl" id="team-scores">
                <span class="text-blue-400">藍隊: <span id="score-blue">0</span></span> | 
                <span class="text-red-400">紅隊: <span id="score-red">0</span></span>
            </div>
            <div class="hud-element text-white text-right">
                <div class="text-sm text-gray-300">WASD 移動 | 滑鼠瞄準</div>
                <div class="text-sm text-gray-300">按住左鍵繪製 | 放開直接生成 | F 拾取</div>
            </div>
        </div>

        <div id="recog-result">識別: 手槍</div>
        <div id="interaction-prompt">按 F 拾取</div>

        <div id="ammo-counter">
            <span id="current-ammo">--</span> / <span id="max-ammo">--</span>
        </div>

        <!-- Controls Hint / Legend -->
        <div id="controls-hint">
            <div class="text-yellow-400 font-bold mb-1">繪畫指南</div>
            <div class="grid grid-cols-5 gap-4 text-xs text-gray-300">
                <div>
                    <div class="hint-icon" style="width:15px; height:15px; border-radius:50%"></div>
                    <div>小圓/方<br>手榴彈</div>
                </div>
                <div>
                    <div class="hint-icon" style="width:20px; height:15px"></div>
                    <div>中型<br>手槍</div>
                </div>
                <div>
                    <div class="hint-icon" style="width:30px; height:10px"></div>
                    <div>長條<br>步槍</div>
                </div>
                <div>
                    <div class="hint-icon" style="width:50px; height:8px"></div>
                    <div>超長<br>狙擊</div>
                </div>
                <div>
                    <div class="hint-icon" style="width:40px; height:40px"></div>
                    <div>巨大<br>坦克</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu">
        <h1>粉筆戰爭 2.0 (極速)</h1>
        <p class="text-gray-300 mb-8 text-xl text-center">
            按住左鍵在地上畫出你的武器！<br>
            畫完直接生成，按 F 撿起。<br>
            小圈=手榴彈，長條=槍械，巨大方塊=坦克
        </p>
        <div class="grid grid-cols-2 gap-4">
            <button class="btn team-select-btn" onclick="startGame(1)">1 v 1</button>
            <button class="btn team-select-btn" onclick="startGame(2)">2 v 2</button>
            <button class="btn team-select-btn" onclick="startGame(4)">4 v 4</button>
            <button class="btn team-select-btn" onclick="startGame(8)">8 v 8</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="hidden">
        <h1 id="winner-text">藍隊獲勝!</h1>
        <button class="btn" onclick="returnToMenu()">返回主選單</button>
    </div>

<script>
/**
 * Game Configuration & Constants
 */
const CANVAS = document.getElementById('gameCanvas');
const CTX = CANVAS.getContext('2d');

// Game Settings
const MAP_WIDTH = 2500;
const MAP_HEIGHT = 2000;

// Colors
const TEAM_BLUE = '#3b82f6';
const TEAM_RED = '#ef4444';
const COLOR_CHALK_WHITE = '#f3f4f6';
const COLOR_ASPHALT = '#1f2937';

// Weapon/Item Definitions
// fillTime kept for data structure consistency but effectively bypassed for initial creation
const WEAPONS = {
    GRENADE: {
        id: 0, name: '手榴彈', type: 'throwable', damage: 120, fireRate: 1000, ammo: 3, range: 400, 
        spread: 0.2, fillTime: 1500, color: '#ef4444', speed: 8, 
        radius: 120, // Explosion radius
        width: 12, length: 12
    },
    PISTOL: {
        id: 1, name: '手槍', type: 'gun', damage: 25, fireRate: 400, ammo: 12, range: 450, 
        spread: 0.1, fillTime: 2000, color: '#fbbf24', speed: 14, 
        width: 15, length: 25
    },
    RIFLE: {
        id: 2, name: '步槍', type: 'gun', damage: 18, fireRate: 100, ammo: 35, range: 650, 
        spread: 0.12, fillTime: 4000, color: '#10b981', speed: 18,
        width: 18, length: 45
    },
    SNIPER: {
        id: 3, name: '狙擊槍', type: 'gun', damage: 110, fireRate: 1500, ammo: 5, range: 1200, 
        spread: 0.005, fillTime: 7000, color: '#f472b6', speed: 30,
        width: 12, length: 70
    },
    TANK: {
        id: 4, name: '坦克', type: 'vehicle', damage: 80, fireRate: 2000, ammo: 999, range: 800, 
        spread: 0.05, fillTime: 10000, color: '#6366f1', speed: 15, 
        radius: 100, // Explosion radius
        width: 60, length: 80
    }
};

const WEAPON_LIST = [WEAPONS.GRENADE, WEAPONS.PISTOL, WEAPONS.RIFLE, WEAPONS.SNIPER, WEAPONS.TANK];

// Global State
let lastTime = 0;
let keys = {};
let mouse = { x: 0, y: 0, worldX: 0, worldY: 0, leftDown: false };
let camera = { x: 0, y: 0 };
let gameActive = false;
let modeTotalPlayers = 2; 
let particles = [];
let projectiles = [];
let outlines = []; 
let players = [];
let myPlayerId = 0;
let scores = { blue: 0, red: 0 };
let currentStroke = []; // Array of {x, y} for drawing

/**
 * Classes
 */

class Vector {
    constructor(x, y) { this.x = x; this.y = y; }
    add(v) { return new Vector(this.x + v.x, this.y + v.y); }
    sub(v) { return new Vector(this.x - v.x, this.y - v.y); }
    mult(n) { return new Vector(this.x * n, this.y * n); }
    mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    normalize() {
        let m = this.mag();
        return m === 0 ? new Vector(0, 0) : new Vector(this.x / m, this.y / m);
    }
    dist(v) { return Math.sqrt(Math.pow(this.x - v.x, 2) + Math.pow(this.y - v.y, 2)); }
}

class Particle {
    constructor(x, y, color, speed, life, size = null) {
        this.pos = new Vector(x, y);
        const angle = Math.random() * Math.PI * 2;
        this.vel = new Vector(Math.cos(angle) * speed, Math.sin(angle) * speed);
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.size = size || (Math.random() * 3 + 1);
    }

    update(dt) {
        this.pos = this.pos.add(this.vel.mult(dt/16));
        this.life -= dt;
        this.vel = this.vel.mult(0.92); // friction
        this.size *= 0.95; // shrink
    }

    draw(ctx) {
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class Outline {
    constructor(x, y, weaponId, teamId) {
        this.pos = new Vector(x, y);
        this.weaponId = weaponId;
        this.data = WEAPON_LIST.find(w => w.id === weaponId);
        this.fillProgress = 0; 
        this.isFilled = false;
        this.creatorTeam = teamId;
        
        this.currentAmmo = this.data.ammo;
        this.angle = Math.random() * Math.PI * 2;
    }

    update(dt) {
        if (this.isFilled) {
            this.angle += 0.001 * dt;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.angle);

        // Progress Ring (Only if not filled, which shouldn't happen much now)
        if (!this.isFilled) {
            ctx.beginPath();
            ctx.arc(0, 0, 40, 0, Math.PI * 2);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.stroke();

            let progressPct = this.fillProgress / this.data.fillTime;
            ctx.beginPath();
            ctx.arc(0, 0, 40, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * progressPct));
            ctx.strokeStyle = this.data.color;
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        ctx.strokeStyle = this.isFilled ? this.data.color : '#888';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        
        if (this.isFilled) ctx.fillStyle = 'rgba(255,255,255,0.2)';
        else ctx.setLineDash([5, 5]);

        // Draw Logic based on type
        ctx.beginPath();
        if (this.data.id === 0) { // Grenade
            ctx.arc(0, 0, 10, 0, Math.PI*2);
            ctx.moveTo(0, -10); ctx.lineTo(5, -20); // Pin
        } else if (this.data.id === 4) { // Tank
            ctx.rect(-30, -30, 60, 60); // Body
            ctx.rect(-10, -45, 20, 30); // Turret
        } else if (this.data.id === 1) { // Pistol
            ctx.rect(-10, -5, 20, 10);
            ctx.rect(5, 5, 5, 8);
        } else if (this.data.id === 2) { // Rifle
            ctx.rect(-20, -6, 40, 12);
            ctx.rect(-20, 0, 5, 10); 
            ctx.rect(10, 6, 4, 8); 
        } else if (this.data.id === 3) { // Sniper
            ctx.rect(-30, -4, 60, 8);
            ctx.rect(-30, 0, 8, 10);
            ctx.rect(-10, -8, 20, 4);
        }
        
        if (this.isFilled) ctx.fill();
        ctx.stroke();
        
        // Name Label
        if (this.isFilled) {
            ctx.rotate(-this.angle);
            ctx.fillStyle = "#fff";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(this.data.name, 0, -45);
        }

        ctx.restore();
    }
}

class Projectile {
    constructor(x, y, angle, weaponData, ownerId) {
        this.pos = new Vector(x, y);
        this.vel = new Vector(Math.cos(angle), Math.sin(angle)).mult(weaponData.speed);
        this.damage = weaponData.damage;
        this.range = weaponData.range;
        this.weaponData = weaponData;
        this.distTraveled = 0;
        this.ownerId = ownerId;
        this.markedForDeletion = false;
        this.color = weaponData.color;
        
        // Grenade specific
        this.isGrenade = (weaponData.id === 0);
        this.isTankShell = (weaponData.id === 4);
        if(this.isGrenade) this.vel = this.vel.mult(0.6); // Slower throw
    }

    update(dt) {
        let move = this.vel.mult(dt/16);
        this.pos = this.pos.add(move);
        this.distTraveled += move.mag();
        
        if (this.distTraveled >= this.range) {
            if (this.isGrenade || this.isTankShell) {
                this.explode();
            }
            this.markedForDeletion = true;
        }

        // Rotate grenade visual
        if(this.isGrenade) this.angle += 0.1;
    }

    explode() {
        // Explosion Effect
        for(let i=0; i<20; i++) {
            particles.push(new Particle(this.pos.x, this.pos.y, '#f59e0b', 4 + Math.random()*4, 600, 5));
            particles.push(new Particle(this.pos.x, this.pos.y, '#fff', 2, 800));
        }
        
        // Area Damage
        let radius = this.weaponData.radius || 100;
        players.forEach(p => {
            if (p.dead) return;
            if (p.team === players[this.ownerId].team && !this.isGrenade) return; // Grenade hurts all? No, safe for team for gameplay flow usually
            
            let d = this.pos.dist(p.pos);
            if (d < radius) {
                // Damage falloff
                let dmg = this.damage * (1 - d/radius);
                p.takeDamage(dmg, players[this.ownerId]);
            }
        });
    }

    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        if (this.isGrenade) {
            ctx.arc(this.pos.x, this.pos.y, 6, 0, Math.PI * 2);
        } else if (this.isTankShell) {
            ctx.arc(this.pos.x, this.pos.y, 8, 0, Math.PI * 2);
        } else {
            ctx.arc(this.pos.x, this.pos.y, 4, 0, Math.PI * 2);
        }
        ctx.fill();
    }
}

class Entity {
    constructor(x, y, team, isBot = false) {
        this.pos = new Vector(x, y);
        this.team = team; 
        this.isBot = isBot;
        this.hp = 100;
        this.maxHp = 100;
        this.dead = false;
        this.radius = 20;
        this.angle = 0;
        
        this.weapon = null; 
        this.isTank = false; // Transformation state
        this.isInteracting = false;
        
        this.lastShotTime = 0;
        this.baseSpeed = 0.2;
        this.moveSpeed = 0.2; 

        // Bot AI
        this.aiState = 'IDLE'; 
        this.targetEntity = null;
        this.targetPos = null;
        this.botNextActionTime = 0;
        this.botNextWanderTime = 0;
        this.botNextMoveTime = 0;
        this.combatMoveType = 0;
        this.wanderTarget = null;
    }

    takeDamage(amount, attacker) {
        if (this.dead) return;
        this.hp -= amount;
        
        // Particles
        if (this.isTank) {
            // 金屬火花特效
            for(let i=0; i<5; i++) {
                particles.push(new Particle(this.pos.x, this.pos.y, '#fbbf24', 6, 400));
                particles.push(new Particle(this.pos.x, this.pos.y, '#9ca3af', 4, 300));
            }
        } else {
            // 粉筆血液特效
            for(let i=0; i<3; i++) {
                particles.push(new Particle(this.pos.x, this.pos.y, this.team === 'blue' ? '#93c5fd' : '#fca5a5', 5, 500));
            }
        }

        if (this.hp <= 0) {
            this.die();
            if (attacker && attacker.team !== this.team) {
                scores[attacker.team]++;
                checkWinCondition();
            }
        }
    }

    die() {
        this.dead = true;
        // Drop weapon?
        if (this.weapon && this.weapon.ammo > 0 && !this.isTank) {
            // Tanks destroy on death, guns drop
             let drop = new Outline(this.pos.x, this.pos.y, this.weapon.id, this.team);
             drop.isFilled = true;
             drop.currentAmmo = this.weapon.currentAmmo;
             drop.fillProgress = drop.data.fillTime;
             outlines.push(drop);
        }
        
        if (this.isTank) {
            // Big explosion
            for(let i=0; i<30; i++) particles.push(new Particle(this.pos.x, this.pos.y, '#444', 5, 1000, 8));
        }

        setTimeout(() => this.respawn(), 3000);
    }

    respawn() {
        this.pos = new Vector(Math.random() * MAP_WIDTH, Math.random() * MAP_HEIGHT);
        this.hp = 100;
        this.maxHp = 100;
        this.dead = false;
        this.weapon = null;
        this.isTank = false;
        this.radius = 20;
        this.moveSpeed = this.baseSpeed;
    }

    update(dt) {
        if (this.dead) return;

        if (this.isBot) {
            this.updateAI(dt);
        } else {
            this.handleInput(dt);
        }

        // Boundaries
        this.pos.x = Math.max(this.radius, Math.min(MAP_WIDTH - this.radius, this.pos.x));
        this.pos.y = Math.max(this.radius, Math.min(MAP_HEIGHT - this.radius, this.pos.y));
    }

    handleInput(dt) {
        let move = new Vector(0, 0);
        if (keys['w'] || keys['W']) move.y = -1;
        if (keys['s'] || keys['S']) move.y = 1;
        if (keys['a'] || keys['A']) move.x = -1;
        if (keys['d'] || keys['D']) move.x = 1;

        if (move.mag() > 0) {
            this.isInteracting = false;
            this.pos = this.pos.add(move.normalize().mult(this.moveSpeed * dt));
        }

        this.angle = Math.atan2(mouse.worldY - this.pos.y, mouse.worldX - this.pos.x);

        // Drawing Logic (Human only)
        if (!this.weapon && !this.isTank) {
            if (mouse.leftDown) {
                // Add point to stroke
                if (currentStroke.length === 0 || 
                    new Vector(mouse.worldX, mouse.worldY).dist(currentStroke[currentStroke.length-1]) > 5) {
                    currentStroke.push(new Vector(mouse.worldX, mouse.worldY));
                }
            } else {
                // Mouse released
                if (currentStroke.length > 5) {
                    this.recognizeAndCreate(currentStroke);
                }
                currentStroke = []; // Clear
            }
        } else if (mouse.leftDown) {
            // Shooting
            this.shoot();
        }

        // Interaction
        let nearestOutline = this.getNearestOutline(this.isTank ? 100 : 50); // Tanks have reach
        
        if (keys['f'] || keys['F']) {
            if (nearestOutline) {
                this.isInteracting = true;
                this.interactWithOutline(nearestOutline, dt);
            }
        } else {
            this.isInteracting = false;
        }

        // Drop Weapon
        if (keys['g'] || keys['G']) {
            if (this.weapon && !this.isTank) { // Can't exit tank currently for simplicity
                this.dropWeapon();
            }
        }
    }

    recognizeAndCreate(points) {
        // Calculate Bounding Box
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        points.forEach(p => {
            if(p.x < minX) minX = p.x;
            if(p.x > maxX) maxX = p.x;
            if(p.y < minY) minY = p.y;
            if(p.y > maxY) maxY = p.y;
        });

        let width = maxX - minX;
        let height = maxY - minY;
        let longer = Math.max(width, height);
        let shorter = Math.min(width, height);
        
        let type = null;
        let name = "";
        let center = new Vector((minX + maxX)/2, (minY + maxY)/2);

        // Heuristics
        if (longer > 150 && shorter > 150) {
            // HUGE -> Tank
            type = WEAPONS.TANK;
            name = "坦克";
        } else if (longer < 60 && shorter < 60) {
            // Small -> Grenade
            type = WEAPONS.GRENADE;
            name = "手榴彈";
        } else {
            // Guns
            let ratio = longer / (shorter + 1); 
            
            if (longer > 150) {
                type = WEAPONS.SNIPER;
                name = "狙擊槍";
            } else if (longer > 80 && ratio > 1.5) {
                type = WEAPONS.RIFLE;
                name = "步槍";
            } else {
                type = WEAPONS.PISTOL;
                name = "手槍";
            }
        }

        if (type) {
            let o = new Outline(center.x, center.y, type.id, this.team);
            o.isFilled = true; // INSTANT FILL
            o.fillProgress = o.data.fillTime;
            
            outlines.push(o);
            showRecognitionResult(name);
            // Effect
            for(let i=0; i<10; i++) particles.push(new Particle(center.x, center.y, '#fff', 2, 400));
        }
    }

    dropWeapon() {
        if (!this.weapon) return;
        let drop = new Outline(this.pos.x, this.pos.y, this.weapon.id, this.team);
        drop.isFilled = true;
        drop.currentAmmo = this.weapon.currentAmmo;
        drop.fillProgress = drop.data.fillTime;
        // Throw forward
        drop.pos.x += Math.cos(this.angle) * 40;
        drop.pos.y += Math.sin(this.angle) * 40;
        outlines.push(drop);
        
        this.weapon = null;
        this.isTank = false;
        keys['g'] = false;
    }

    updateAI(dt) {
        let now = Date.now();
        // 戰鬥視野限制 (進入此範圍才開火和戰術走位)
        let nearestEnemy = this.getNearestEnemy(1000); 
        // 全域索敵 (主動找人用的雷達)
        let huntEnemy = this.getNearestEnemy(99999);
        let nearestOutline = this.getNearestOutline(800); 

        if (this.weapon) {
            if (nearestEnemy) {
                this.aimAt(nearestEnemy.pos);
                let dist = this.pos.dist(nearestEnemy.pos);
                
                // 在射程內就開火
                if (dist < this.weapon.range) {
                    this.shoot();
                }
                
                // 定期改變戰鬥移動模式 (0.5秒~2秒變換一次)
                if (now > this.botNextMoveTime) {
                    this.botNextMoveTime = now + 500 + Math.random() * 1500;
                    this.combatMoveType = Math.floor(Math.random() * 5); // 0:前進, 1:後退, 2:左移, 3:右移, 4:原地停駐
                }

                // 執行戰鬥移動
                if (this.isTank) {
                    // 坦克大多時間往前推進
                    if (dist > 300 && this.combatMoveType !== 4) {
                         this.moveTo(nearestEnemy.pos, dt);
                    }
                } else {
                    if (this.combatMoveType === 0 && dist > 200) {
                        this.moveTo(nearestEnemy.pos, dt);
                    } else if (this.combatMoveType === 1 && dist < this.weapon.range) {
                        let away = this.pos.sub(nearestEnemy.pos).normalize();
                        this.pos = this.pos.add(away.mult(this.moveSpeed * dt * 0.8));
                    } else if (this.combatMoveType === 2) {
                        let left = new Vector(Math.cos(this.angle - Math.PI/2), Math.sin(this.angle - Math.PI/2));
                        this.pos = this.pos.add(left.mult(this.moveSpeed * dt * 0.8));
                    } else if (this.combatMoveType === 3) {
                        let right = new Vector(Math.cos(this.angle + Math.PI/2), Math.sin(this.angle + Math.PI/2));
                        this.pos = this.pos.add(right.mult(this.moveSpeed * dt * 0.8));
                    }
                }
            } else if (huntEnemy) {
                // 視野內沒人，但知道地圖上有敵人 -> 主動追擊找人
                this.aimAt(huntEnemy.pos);
                this.moveTo(huntEnemy.pos, dt);
            } else {
                // 完全找不到敵人時才隨機巡邏 (Wander，例如敵方全滅)
                if (now > this.botNextWanderTime || !this.wanderTarget) {
                    this.botNextWanderTime = now + 2000 + Math.random() * 3000;
                    this.wanderTarget = new Vector(
                        this.pos.x + (Math.random() * 800 - 400),
                        this.pos.y + (Math.random() * 800 - 400)
                    );
                    this.wanderTarget.x = Math.max(50, Math.min(MAP_WIDTH - 50, this.wanderTarget.x));
                    this.wanderTarget.y = Math.max(50, Math.min(MAP_HEIGHT - 50, this.wanderTarget.y));
                }
                
                if (this.pos.dist(this.wanderTarget) > 20) {
                    this.moveTo(this.wanderTarget, dt * 0.5); // 巡邏時走慢一點
                }
            }
        } else {
            // Need Weapon
            if (nearestOutline) {
                if (this.pos.dist(nearestOutline.pos) < 30) {
                    this.interactWithOutline(nearestOutline, dt);
                } else {
                    this.moveTo(nearestOutline.pos, dt);
                }
            } else {
                // Create random outline
                if (now > this.botNextActionTime) {
                    this.botNextActionTime = now + 5000;
                    let w = WEAPON_LIST[Math.floor(Math.random() * WEAPON_LIST.length)];
                    let spawnPos = this.pos.add(new Vector(Math.random()*40-20, Math.random()*40-20));
                    
                    // Bots also spawn instantly filled weapons
                    let o = new Outline(spawnPos.x, spawnPos.y, w.id, this.team);
                    o.isFilled = true;
                    o.fillProgress = o.data.fillTime;
                    outlines.push(o);
                }
            }
        }
    }

    aimAt(targetPos) {
        this.angle = Math.atan2(targetPos.y - this.pos.y, targetPos.x - this.pos.x);
    }

    moveTo(targetPos, dt) {
        let dir = targetPos.sub(this.pos).normalize();
        this.pos = this.pos.add(dir.mult(this.moveSpeed * dt));
        this.angle = Math.atan2(dir.y, dir.x);
    }

    getNearestOutline(range) {
        let nearest = null;
        let minDist = range;
        for (let o of outlines) {
            let d = this.pos.dist(o.pos);
            if (d < minDist) {
                minDist = d;
                nearest = o;
            }
        }
        return nearest;
    }

    getNearestEnemy(maxRange = 9999) {
        let nearest = null;
        let minDist = maxRange;
        for (let p of players) {
            if (p.dead || p.team === this.team) continue;
            let d = this.pos.dist(p.pos);
            if (d < minDist) {
                minDist = d;
                nearest = p;
            }
        }
        return nearest;
    }

    interactWithOutline(outline, dt) {
        if (outline.isFilled) {
            // Pickup logic
            if (outline.data.id === 4) {
                // Tank Pickup
                this.isTank = true;
                this.hp = 500;
                this.maxHp = 500;
                this.radius = 40;
                this.moveSpeed = 0.1; // Slow
            } else {
                // Normal
                this.radius = 20;
                this.moveSpeed = 0.2;
            }
            
            this.weapon = {
                ...outline.data,
                currentAmmo: outline.currentAmmo
            };
            outlines = outlines.filter(o => o !== outline);
        } else {
            // Filling Logic (Technically unreachable now for new items, but kept for robustness)
            outline.fillProgress += dt;
            if (Math.random() < 0.1) {
                particles.push(new Particle(outline.pos.x, outline.pos.y, outline.data.color, 2, 500));
            }

            if (outline.fillProgress >= outline.data.fillTime) {
                outline.isFilled = true;
                outline.fillProgress = outline.data.fillTime;
                this.interactWithOutline(outline, dt); 
            }
        }
    }

    shoot() {
        let now = Date.now();
        if (now - this.lastShotTime < this.weapon.fireRate) return;
        if (this.weapon.currentAmmo <= 0) {
            if (!this.isTank) {
                this.weapon = null; // Discard empty gun
            }
            return;
        }

        this.lastShotTime = now;
        this.weapon.currentAmmo--;

        let spreadAngle = (Math.random() - 0.5) * this.weapon.spread;
        let finalAngle = this.angle + spreadAngle;

        let spawnDist = this.isTank ? 60 : 40;
        let px = this.pos.x + Math.cos(this.angle) * spawnDist;
        let py = this.pos.y + Math.sin(this.angle) * spawnDist;

        projectiles.push(new Projectile(px, py, finalAngle, this.weapon, players.indexOf(this)));

        // Recoil
        if (this.isTank) {
            this.pos = this.pos.sub(new Vector(Math.cos(this.angle), Math.sin(this.angle)).mult(2));
        } else {
            this.pos = this.pos.sub(new Vector(Math.cos(this.angle), Math.sin(this.angle)).mult(5));
        }

        particles.push(new Particle(px, py, '#fbbf24', 4, 300));
    }

    draw(ctx) {
        if (this.dead) {
            ctx.fillStyle = '#333';
            ctx.beginPath();
            if(this.isTank) ctx.rect(this.pos.x-30, this.pos.y-30, 60, 60);
            else ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI*2);
            ctx.fill();
            return;
        }

        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.angle);

        // Draw Character/Vehicle
        if (this.isTank) {
            // TANK GRAPHICS
            ctx.fillStyle = this.team === 'blue' ? '#1e3a8a' : '#7f1d1d';
            ctx.fillRect(-35, -30, 70, 60); // Tracks/Body
            ctx.fillStyle = this.team === 'blue' ? TEAM_BLUE : TEAM_RED;
            ctx.fillRect(-25, -20, 50, 40); // Main Body
            
            // Turret
            ctx.fillStyle = '#4b5563';
            ctx.fillRect(-10, -10, 20, 20);
            ctx.fillRect(10, -5, 40, 10); // Barrel
            
            // HP Bar for Tank
            ctx.rotate(-this.angle);
            ctx.fillStyle = 'red';
            ctx.fillRect(-40, -50, 80, 8);
            ctx.fillStyle = '#10b981';
            ctx.fillRect(-40, -50, 80 * (this.hp/this.maxHp), 8);

        } else {
            // HUMAN GRAPHICS
            ctx.fillStyle = this.team === 'blue' ? TEAM_BLUE : TEAM_RED;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Arms
            ctx.fillStyle = '#f3f4f6'; 
            if (this.weapon) {
                // Holding Weapon
                ctx.beginPath();
                ctx.arc(15, 10, 6, 0, Math.PI*2); 
                ctx.arc(15, -10, 6, 0, Math.PI*2); 
                ctx.fill();
                
                // Weapon Visual
                ctx.fillStyle = this.weapon.color;
                if(this.weapon.id === 0) { // Grenade
                     ctx.beginPath(); ctx.arc(20, 0, 8, 0, Math.PI*2); ctx.fill();
                } else {
                     ctx.fillRect(10, -3, this.weapon.length || 30, 6);
                }
            } else {
                // Holding Chalk
                ctx.beginPath();
                ctx.arc(15, 5, 6, 0, Math.PI*2);
                ctx.arc(5, -15, 6, 0, Math.PI*2); 
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillRect(12, 2, 10, 6);
            }
            
            // HP Bar
            if (this.hp < 100) {
                ctx.rotate(-this.angle);
                ctx.fillStyle = 'red';
                ctx.fillRect(-20, -35, 40, 5);
                ctx.fillStyle = '#10b981';
                ctx.fillRect(-20, -35, 40 * (this.hp/100), 5);
            }
        }

        ctx.restore();
        
        // Progress Bar
        if (this.isInteracting) {
             ctx.fillStyle = '#fbbf24';
             ctx.fillRect(this.pos.x - 20, this.pos.y + (this.isTank?50:30), 40, 4);
        }
    }
}

/**
 * Game Manager
 */

function init() {
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);
    
    CANVAS.addEventListener('mousemove', e => {
        let rect = CANVAS.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });
    CANVAS.addEventListener('mousedown', () => mouse.leftDown = true);
    CANVAS.addEventListener('mouseup', () => mouse.leftDown = false);
    
    // Drop key
    window.addEventListener('keydown', e => {
        if(e.key === 'g' || e.key === 'G') keys['g'] = true;
    });

    requestAnimationFrame(loop);
}

function resize() {
    CANVAS.width = window.innerWidth;
    CANVAS.height = window.innerHeight;
}

function startGame(teamSize) {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    
    modeTotalPlayers = teamSize * 2;
    players = [];
    outlines = [];
    projectiles = [];
    particles = [];
    scores = { blue: 0, red: 0 };
    gameActive = true;

    for (let i = 0; i < modeTotalPlayers; i++) {
        let isBlue = i < teamSize;
        let team = isBlue ? 'blue' : 'red';
        let x = isBlue ? 100 + Math.random()*200 : MAP_WIDTH - 300 + Math.random()*200;
        let y = Math.random() * (MAP_HEIGHT - 200) + 100;
        
        let p = new Entity(x, y, team, i !== 0); 
        players.push(p);
    }
    myPlayerId = 0;
}

function showRecognitionResult(text) {
    const el = document.getElementById('recog-result');
    el.innerText = "識別: " + text;
    el.style.opacity = 1;
    setTimeout(() => { el.style.opacity = 0; }, 2000);
}

function updateCamera() {
    if (!players[myPlayerId]) return;
    let p = players[myPlayerId];
    
    let targetX = p.pos.x - CANVAS.width / 2;
    let targetY = p.pos.y - CANVAS.height / 2;
    
    camera.x += (targetX - camera.x) * 0.1;
    camera.y += (targetY - camera.y) * 0.1;

    camera.x = Math.max(0, Math.min(MAP_WIDTH - CANVAS.width, camera.x));
    camera.y = Math.max(0, Math.min(MAP_HEIGHT - CANVAS.height, camera.y));
    
    mouse.worldX = mouse.x + camera.x;
    mouse.worldY = mouse.y + camera.y;
}

function checkWinCondition() {
    document.getElementById('score-blue').innerText = scores.blue;
    document.getElementById('score-red').innerText = scores.red;

    if (scores.blue >= 15 || scores.red >= 15) { // Increased score limit
        gameActive = false;
        document.getElementById('game-over-screen').classList.remove('hidden');
        document.getElementById('winner-text').innerText = scores.blue >= 15 ? "藍隊獲勝!" : "紅隊獲勝!";
        document.getElementById('winner-text').style.color = scores.blue >= 15 ? TEAM_BLUE : TEAM_RED;
    }
}

function returnToMenu() {
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('main-menu').classList.remove('hidden');
    document.getElementById('game-ui').classList.add('hidden');
}

function updateUI() {
    if (!players[myPlayerId]) return;
    const p = players[myPlayerId];

    if (p.weapon) {
        document.getElementById('current-ammo').innerText = p.weapon.currentAmmo;
        document.getElementById('max-ammo').innerText = p.weapon.ammo;
    } else {
        document.getElementById('current-ammo').innerText = "--";
        document.getElementById('max-ammo').innerText = "--";
    }

    const prompt = document.getElementById('interaction-prompt');
    let nearest = p.getNearestOutline(p.isTank ? 100 : 50);
    if (nearest && !p.weapon) {
        prompt.style.display = 'block';
        prompt.innerText = nearest.isFilled ? "按 F 拾取" : "按住 F 填補";
    } else {
        prompt.style.display = 'none';
    }
}

/**
 * Main Loop
 */
function loop(timestamp) {
    let dt = timestamp - lastTime;
    lastTime = timestamp;

    if (gameActive) {
        updateCamera();

        players.forEach(p => p.update(dt));
        outlines.forEach(o => o.update(dt));
        particles.forEach((p, i) => {
            p.update(dt);
            if(p.life <= 0) particles.splice(i, 1);
        });
        
        projectiles.forEach((proj, i) => {
            proj.update(dt);
            if (proj.markedForDeletion) {
                projectiles.splice(i, 1);
                return;
            }
            
            // Basic collision
            for (let p of players) {
                if (p.dead) continue;
                if (p === players[proj.ownerId]) continue; 
                if (players[proj.ownerId].team === p.team) continue;

                let hitRadius = p.isTank ? 40 : p.radius;
                if (proj.pos.dist(p.pos) < hitRadius) {
                    if (proj.isGrenade) {
                        // 手榴彈穿過人體，直到飛到最大射程才爆炸
                        continue;
                    } else if (proj.isTankShell) {
                        // 坦克砲彈一碰到敵人就立刻爆炸
                        proj.explode();
                        proj.markedForDeletion = true;
                        break;
                    } else {
                        // 一般子彈直接造成傷害
                        p.takeDamage(proj.damage, players[proj.ownerId]);
                        proj.markedForDeletion = true;
                        for(let k=0; k<3; k++) particles.push(new Particle(proj.pos.x, proj.pos.y, '#fff', 3, 100));
                        break;
                    }
                }
            }
        });

        updateUI();
    }

    // Render
    CTX.fillStyle = COLOR_ASPHALT;
    CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);

    CTX.save();
    CTX.translate(-camera.x, -camera.y);

    // Map Grid
    CTX.strokeStyle = 'rgba(255,255,255,0.05)';
    CTX.lineWidth = 2;
    CTX.beginPath();
    for(let x=0; x<=MAP_WIDTH; x+=100) { CTX.moveTo(x, 0); CTX.lineTo(x, MAP_HEIGHT); }
    for(let y=0; y<=MAP_HEIGHT; y+=100) { CTX.moveTo(0, y); CTX.lineTo(MAP_WIDTH, y); }
    CTX.stroke();
    CTX.strokeStyle = '#f59e0b';
    CTX.lineWidth = 10;
    CTX.strokeRect(0,0, MAP_WIDTH, MAP_HEIGHT);

    outlines.forEach(o => o.draw(CTX));
    players.forEach(p => p.draw(CTX)); 
    projectiles.forEach(p => p.draw(CTX));
    particles.forEach(p => p.draw(CTX));

    // Player Aim Line
    if (players[myPlayerId] && !players[myPlayerId].dead && players[myPlayerId].weapon) {
        let p = players[myPlayerId];
        CTX.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        CTX.lineWidth = 1;
        CTX.setLineDash([10, 10]);
        CTX.beginPath();
        CTX.moveTo(p.pos.x, p.pos.y);
        CTX.lineTo(mouse.worldX, mouse.worldY);
        CTX.stroke();
        CTX.setLineDash([]);
    }

    // Drawing Stroke
    if (currentStroke.length > 0) {
        CTX.strokeStyle = '#fff';
        CTX.lineWidth = 4;
        CTX.lineCap = 'round';
        CTX.lineJoin = 'round';
        CTX.setLineDash([5, 10]); // Chalky look
        CTX.beginPath();
        CTX.moveTo(currentStroke[0].x, currentStroke[0].y);
        for(let i=1; i<currentStroke.length; i++) {
            CTX.lineTo(currentStroke[i].x, currentStroke[i].y);
        }
        CTX.stroke();
        CTX.setLineDash([]);
    }

    CTX.restore();
    requestAnimationFrame(loop);
}

init();

</script>
</body>
