<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>打殭屍生存戰</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #222; 
      color: white; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      user-select: none; 
    }
    #ui { 
      position: absolute; 
      top: 20px; 
      left: 20px; 
      font-size: 24px; 
      font-weight: bold; 
      text-shadow: 2px 2px 0px #000; 
    }
    #gameOver { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      font-size: 50px; 
      color: #ff3333; 
      display: none; 
      text-align: center; 
      font-weight: bold;
      text-shadow: 3px 3px 0px #000;
    }
    .restart-btn {
      font-size: 20px;
      color: white;
      background: #555;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
      display: inline-block;
    }
    .restart-btn:hover { background: #777; }
  </style>
</head>
<body>
  <div id="ui">分數: <span id="score">0</span> &nbsp;|&nbsp; 生命值: <span id="hp">3</span></div>
  <div id="gameOver">
    遊戲結束！被殭屍吃掉了 🧟‍♂️<br>
    <div class="restart-btn" onclick="location.reload()">點擊重新開始</div>
  </div>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let hp = 3;
    let isGameOver = false;

    // 鍵盤狀態追蹤
    const keys = { w: false, a: false, s: false, d: false };

    // 玩家設定 (藍色圓形)
    const player = {
      x: canvas.width / 2, 
      y: canvas.height / 2, 
      radius: 15, 
      color: '#00d2ff', 
      speed: 4
    };

    const bullets = [];
    const zombies = [];

    // 監聽鍵盤與滑鼠事件
    window.addEventListener('keydown', e => { 
      if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; 
    });
    window.addEventListener('keyup', e => { 
      if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; 
    });
    
    // 點擊滑鼠射擊
    window.addEventListener('mousedown', e => {
      if (isGameOver) return;
      // 計算滑鼠與玩家的角度
      const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
      bullets.push({
        x: player.x, 
        y: player.y, 
        radius: 6, 
        color: '#ffea00',
        velocity: { x: Math.cos(angle) * 12, y: Math.sin(angle) * 12 } // 子彈速度
      });
    });

    // 生成殭屍 (從畫面外往內走)
    function spawnZombie() {
      const radius = 15;
      let x, y;
      if (Math.random() < 0.5) {
        x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
        y = Math.random() * canvas.height;
      } else {
        x = Math.random() * canvas.width;
        y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
      }
      zombies.push({ 
        x, y, radius, 
        color: '#39ff14', // 螢光綠
        speed: 1 + Math.random() * 1.5 // 隨機速度
      });
    }

    // 每 1 秒產生一隻新殭屍
    let spawnInterval = setInterval(spawnZombie, 1000);

    // 遊戲主迴圈
    function animate() {
      if (isGameOver) return;
      requestAnimationFrame(animate);
      
      // 畫背景 (帶有一點殘影效果)
      ctx.fillStyle = 'rgba(34, 34, 34, 0.4)'; 
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 1. 處理玩家移動 (並限制不能跑出畫面)
      if (keys.w && player.y - player.radius > 0) player.y -= player.speed;
      if (keys.s && player.y + player.radius < canvas.height) player.y += player.speed;
      if (keys.a && player.x - player.radius > 0) player.x -= player.speed;
      if (keys.d && player.x + player.radius < canvas.width) player.x += player.speed;

      // 畫玩家
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fillStyle = player.color;
      ctx.fill();
      // 畫玩家的邊框讓它看起來更立體
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#fff';
      ctx.stroke();

      // 2. 處理子彈
      bullets.forEach((bullet, bIndex) => {
        bullet.x += bullet.velocity.x;
        bullet.y += bullet.velocity.y;
        
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
        ctx.fillStyle = bullet.color;
        ctx.fill();

        // 移除飛出畫面的子彈
        if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
          bullets.splice(bIndex, 1);
        }
      });

      // 3. 處理殭屍
      zombies.forEach((zombie, zIndex) => {
        // 殭屍永遠面向玩家前進
        const angle = Math.atan2(player.y - zombie.y, player.x - zombie.x);
        zombie.x += Math.cos(angle) * zombie.speed;
        zombie.y += Math.sin(angle) * zombie.speed;

        ctx.beginPath();
        ctx.arc(zombie.x, zombie.y, zombie.radius, 0, Math.PI * 2);
        ctx.fillStyle = zombie.color;
        ctx.fill();

        // 碰撞判定：殭屍咬到玩家
        const distToPlayer = Math.hypot(player.x - zombie.x, player.y - zombie.y);
        if (distToPlayer - player.radius - zombie.radius < 1) {
          zombies.splice(zIndex, 1); // 殭屍消失
          hp--; // 扣血
          document.getElementById('hp').innerText = hp;
          
          if (hp <= 0) {
            isGameOver = true;
            document.getElementById('gameOver').style.display = 'block';
            clearInterval(spawnInterval); // 停止生成殭屍
          }
        }

        // 碰撞判定：子彈打中殭屍
        bullets.forEach((bullet, bIndex) => {
          const distToBullet = Math.hypot(bullet.x - zombie.x, bullet.y - zombie.y);
          if (distToBullet - bullet.radius - zombie.radius < 1) {
            // 使用 setTimeout 避免在迴圈中直接刪除陣列元素導致的閃爍問題
            setTimeout(() => {
              zombies.splice(zIndex, 1);
              bullets.splice(bIndex, 1);
              score += 10;
              document.getElementById('score').innerText = score;
            }, 0);
          }
        });
      });
    }
    
    // 啟動遊戲
    animate();
  </script>
</body>
</html>
