<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鬼抓人 - 傳染病與豪華商城版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; touch-action: none; }
        canvas { display: block; }
        body { font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative text-white select-none">

    <!-- 遊戲 UI 介面 -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-10 hidden">
        <!-- 頂部資訊 -->
        <div class="flex justify-between items-start">
            <div class="flex flex-col gap-2">
                <div class="flex gap-2 pointer-events-auto">
                    <button onclick="togglePause()" id="pause-btn-ui" class="bg-gray-800 hover:bg-gray-700 bg-opacity-80 p-3 rounded-xl backdrop-blur-md border border-gray-600 shadow-lg text-white font-bold transition-transform active:scale-95">
                        ⏸️
                    </button>
                    <div class="bg-gray-800 bg-opacity-80 px-4 py-3 rounded-xl backdrop-blur-md border border-gray-600 shadow-lg">
                        <h2 class="text-xl sm:text-2xl font-black text-blue-400 tracking-wider">
                            倒數: <span id="timeDisplay" class="text-white">180.0</span> 秒
                        </h2>
                    </div>
                </div>
                <!-- 遊戲中金幣顯示 -->
                <div class="bg-yellow-600 bg-opacity-90 px-3 py-1 rounded-lg border border-yellow-400 shadow-sm w-fit pointer-events-auto">
                    <span class="font-bold text-sm sm:text-base">💰 <span id="coinDisplay">0</span></span>
                </div>
            </div>
            
            <div class="flex flex-col items-end gap-2">
                <div class="bg-gray-800 bg-opacity-80 px-4 py-2 rounded-xl backdrop-blur-md border border-gray-600 text-right shadow-lg">
                    <p class="text-sm sm:text-lg text-gray-200 font-bold">
                        人類存活: <span id="humanCountDisplay" class="text-green-400">9</span>
                    </p>
                    <p class="text-xs sm:text-sm text-gray-400" id="roleDisplay">身分: 尚未選擇</p>
                </div>
                <!-- 移除遊戲中的商店按鈕 -->
            </div>
        </div>

        <!-- 觀戰提示 -->
        <div id="spectate-ui" class="hidden absolute bottom-24 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-80 px-6 py-3 rounded-full text-white font-bold text-center z-10 pointer-events-none border border-gray-600 shadow-[0_0_15px_rgba(255,255,255,0.2)]">
            <span class="text-xl">👁️ 觀戰模式</span><br>
            <span class="text-sm text-gray-300">點擊畫面 / 空白鍵 切換</span>
        </div>

        <!-- 右下角按鈕組 -->
        <div class="absolute bottom-8 right-4 sm:right-8 flex gap-4 pointer-events-auto items-end">
            <!-- 嘲諷按鈕 -->
            <div id="taunt-ui" class="hidden flex flex-col items-center">
                <button id="taunt-btn" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-red-600 border-4 border-red-400 text-2xl shadow-[0_0_15px_rgba(220,38,38,0.8)] active:scale-90 transition-transform flex items-center justify-center relative overflow-hidden">
                    <span id="taunt-icon" class="z-10 relative">📢</span>
                    <div id="taunt-cd-overlay" class="absolute inset-0 bg-black bg-opacity-60 z-20 flex items-center justify-center hidden">
                        <span id="taunt-cd-text" class="text-white text-sm font-bold"></span>
                    </div>
                </button>
                <p class="text-xs mt-1 font-bold text-red-400 bg-black bg-opacity-50 px-2 rounded">T 嘲諷</p>
            </div>

            <!-- 技能按鈕 -->
            <div id="skill-ui" class="hidden flex flex-col items-center">
                <button id="skill-btn" class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-blue-600 border-4 border-blue-400 text-3xl shadow-[0_0_20px_rgba(37,99,235,0.8)] active:scale-95 transition-transform flex flex-col items-center justify-center relative overflow-hidden">
                    <span id="skill-icon" class="z-10 relative">⚡</span>
                    <div id="skill-cooldown-overlay" class="absolute inset-0 bg-black bg-opacity-60 z-20 flex items-center justify-center hidden">
                        <span id="skill-cd-text" class="text-white text-xl font-bold"></span>
                    </div>
                </button>
                <p class="text-xs sm:text-sm mt-1 text-white font-bold bg-black bg-opacity-50 px-2 rounded">空白 技能</p>
            </div>
        </div>
    </div>

    <!-- 商店選單 -->
    <div id="shop-overlay" class="hidden absolute inset-0 bg-black bg-opacity-95 z-50 flex items-center justify-center p-4 backdrop-blur-md pointer-events-auto">
        <div class="bg-gray-900 border-2 border-indigo-500 rounded-3xl max-w-2xl w-full h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 sm:p-6 border-b border-gray-800 flex justify-between items-center bg-gray-800">
                <h2 class="text-2xl sm:text-3xl font-black text-indigo-400">🛒 豪華商城</h2>
                <div class="flex items-center gap-4">
                    <span class="text-yellow-400 font-bold text-xl">💰 <span id="shopCoinDisplay">0</span></span>
                    <button onclick="closeShop()" class="text-gray-400 hover:text-white text-3xl font-bold">✕</button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 sm:p-6 no-scrollbar">
                <div class="mb-8">
                    <h3 class="text-xl font-bold text-white mb-4 border-l-4 border-blue-500 pl-2">🎭 人類外觀皮膚</h3>
                    <div id="skin-list" class="grid grid-cols-3 sm:grid-cols-4 gap-3"></div>
                </div>
                <div class="mb-8">
                    <h3 class="text-xl font-bold text-white mb-4 border-l-4 border-red-500 pl-2">📢 嘲諷圖案 (吸引鬼注意)</h3>
                    <div id="taunt-symbol-list" class="grid grid-cols-3 sm:grid-cols-4 gap-3"></div>
                </div>
            </div>
            <div class="p-3 bg-gray-800 text-center text-gray-400 text-sm">點擊花費金幣購買，已購買可點擊裝備</div>
        </div>
    </div>

    <!-- 暫停選單 -->
    <div id="pause-overlay" class="hidden absolute inset-0 bg-black bg-opacity-75 z-30 flex flex-col items-center justify-center pointer-events-auto backdrop-blur-sm">
        <h2 class="text-5xl font-extrabold text-white mb-8 tracking-widest drop-shadow-lg">暫停</h2>
        <button onclick="togglePause()" class="w-64 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl mb-4 text-2xl shadow-lg transform transition active:scale-95">繼續</button>
        <button onclick="returnToMenu()" class="w-64 py-4 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-xl text-2xl shadow-lg transform transition active:scale-95 border border-gray-500">回主選單</button>
    </div>

    <!-- 主選單覆蓋層 -->
    <div id="overlay" class="absolute inset-0 bg-black bg-opacity-90 flex items-center justify-center pointer-events-auto transition-opacity duration-300 z-40">
        <div class="bg-gray-900 border-2 border-indigo-500 p-6 sm:p-8 rounded-2xl max-w-lg w-full text-center shadow-[0_0_40px_rgba(99,102,241,0.4)] max-h-screen overflow-y-auto no-scrollbar">
            <h1 id="screen-title" class="text-3xl sm:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-2 mt-2">
                鬼抓人 <span class="text-yellow-400 text-xl">v2.0</span>
            </h1>
            
            <div id="final-score" class="hidden mb-4 mt-4 bg-gray-800 p-4 rounded-lg border border-gray-700">
                <p id="final-message" class="text-xl font-bold text-white"></p>
                <p id="final-coins" class="text-yellow-400 mt-2 font-bold text-lg"></p>
            </div>
            
            <div id="setup-section" class="flex flex-col gap-3 mt-4 mb-2">
                <!-- 主畫面商城按鈕與金幣顯示 -->
                <div class="flex justify-between items-center bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <div class="text-yellow-400 font-bold text-lg">💰 <span id="menuCoinDisplay">0</span></div>
                    <button onclick="openShop()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg shadow font-bold transition-all active:scale-95">
                        🛒 進入商城
                    </button>
                </div>

                <!-- 模式選擇 -->
                <div class="bg-gray-800 p-3 rounded-xl text-left border border-gray-700">
                    <h3 class="text-white font-bold mb-2">🎮 遊戲模式</h3>
                    <div class="flex gap-2">
                        <button onclick="selectMode('standard')" id="btn-mode-standard" class="flex-1 py-2 bg-indigo-600 text-white font-bold rounded-lg border-2 border-white transition-all">一般模式</button>
                        <button onclick="selectMode('infection')" id="btn-mode-infection" class="flex-1 py-2 bg-gray-700 text-white font-bold rounded-lg border-2 border-transparent transition-all">🧟 傳染病模式</button>
                    </div>
                    <p id="mode-desc" class="text-xs text-gray-400 mt-2">一般模式：存活或抓光。人被抓直接淘汰。</p>
                </div>

                <!-- 地圖選擇 -->
                <div class="bg-gray-800 p-3 rounded-xl text-left border border-gray-700">
                    <h3 class="text-white font-bold mb-2">🗺️ 選擇地圖</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="selectMap('classic')" id="btn-map-classic" class="py-2 bg-blue-600 text-white font-bold text-sm rounded-lg border-2 border-white">經典溜鬼</button>
                        <button onclick="selectMap('factory')" id="btn-map-factory" class="py-2 bg-gray-700 text-white font-bold text-sm rounded-lg border-2 border-transparent">廢棄工廠</button>
                        <button onclick="selectMap('maze')" id="btn-map-maze" class="py-2 bg-gray-700 text-white font-bold text-sm rounded-lg border-2 border-transparent">巨大迷宮</button>
                    </div>
                </div>

                <!-- 陣營選擇 -->
                <div class="bg-gray-800 p-3 rounded-xl text-left border border-gray-700">
                    <h3 class="text-white font-bold mb-2">👤 選擇陣營</h3>
                    <div class="flex gap-2">
                        <button onclick="selectRole('human')" id="btn-role-human" class="flex-1 py-2 bg-blue-600 text-white font-bold rounded-lg border-2 border-white transition-all">😃 當人</button>
                        <button onclick="selectRole('ghost')" id="btn-role-ghost" class="flex-1 py-2 bg-gray-700 text-white font-bold rounded-lg border-2 border-transparent transition-all">👻 當鬼</button>
                    </div>
                </div>

                <!-- 職業選擇 -->
                <div class="bg-gray-800 p-3 rounded-xl text-left border border-gray-700">
                    <h3 class="text-white font-bold mb-2">⚔️ 選擇職業</h3>
                    <div id="class-selection" class="grid grid-cols-2 sm:grid-cols-3 gap-2 max-h-40 overflow-y-auto pr-1 no-scrollbar">
                        <!-- 動態生成 -->
                    </div>
                </div>

                <button onclick="startSetupGame()" id="btn-start" disabled class="w-full py-4 px-6 bg-green-600 disabled:bg-gray-600 disabled:text-gray-400 text-white font-bold rounded-xl shadow-[0_0_15px_rgba(22,163,74,0.5)] transform transition active:scale-95 text-xl mt-2">
                    開始遊戲
                </button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const UI = {
            uiLayer: document.getElementById('ui-layer'),
            overlay: document.getElementById('overlay'),
            screenTitle: document.getElementById('screen-title'),
            finalScoreDiv: document.getElementById('final-score'),
            finalMessage: document.getElementById('final-message'),
            finalCoins: document.getElementById('final-coins'),
            timeDisplay: document.getElementById('timeDisplay'),
            humanCountDisplay: document.getElementById('humanCountDisplay'),
            roleDisplay: document.getElementById('roleDisplay'),
            coinDisplay: document.getElementById('coinDisplay'),
            menuCoinDisplay: document.getElementById('menuCoinDisplay'),
            shopCoinDisplay: document.getElementById('shopCoinDisplay'),
            skillUI: document.getElementById('skill-ui'),
            skillBtn: document.getElementById('skill-btn'),
            skillIcon: document.getElementById('skill-icon'),
            skillCdOverlay: document.getElementById('skill-cooldown-overlay'),
            skillCdText: document.getElementById('skill-cd-text'),
            tauntUI: document.getElementById('taunt-ui'),
            tauntBtn: document.getElementById('taunt-btn'),
            tauntIcon: document.getElementById('taunt-icon'),
            tauntCdOverlay: document.getElementById('taunt-cd-overlay'),
            tauntCdText: document.getElementById('taunt-cd-text'),
            setupSection: document.getElementById('setup-section'),
            classSelectionDiv: document.getElementById('class-selection'),
            btnStart: document.getElementById('btn-start'),
            pauseOverlay: document.getElementById('pause-overlay'),
            spectateUI: document.getElementById('spectate-ui'),
            shopOverlay: document.getElementById('shop-overlay'),
            skinList: document.getElementById('skin-list'),
            tauntSymbolList: document.getElementById('taunt-symbol-list')
        };

        // --- 遊戲資料庫 ---
        const CLASSES = {
            human: [
                { id: 'runner', name: '跑者', icon: '🏃', desc: '技能：衝刺', baseSpeed: 380, skillCd: 6, color: 'bg-blue-500', emoji: '😃' },
                { id: 'ninja', name: '忍者', icon: '🥷', desc: '技能：隱身加速', baseSpeed: 330, skillCd: 12, color: 'bg-purple-500', emoji: '🥷' },
                { id: 'guardian', name: '守護者', icon: '🛡️', desc: '技能：獲得護盾', baseSpeed: 340, skillCd: 15, color: 'bg-yellow-500', emoji: '👷' },
                { id: 'jumper', name: '閃現者', icon: '✨', desc: '技能：超遠瞬移', baseSpeed: 350, skillCd: 8, color: 'bg-pink-500', emoji: '🧙' },
                { id: 'mecha', name: '機甲技師', icon: '🤖', desc: '技能：極速衝刺', baseSpeed: 350, skillCd: 10, color: 'bg-orange-500', emoji: '👨‍🔧' },
                { id: 'sensor', name: '感測專家', icon: '📡', desc: '技能：放置雷達', baseSpeed: 340, skillCd: 12, color: 'bg-teal-500', emoji: '🕵️' },
                { id: 'magician', name: '魔術師', icon: '🎩', desc: '技能：全息投影', baseSpeed: 360, skillCd: 14, color: 'bg-indigo-500', emoji: '🧛‍♂️' }
            ],
            ghost: [
                { id: 'brute', name: '猛鬼', icon: '👹', desc: '技能：突進', baseSpeed: 380, skillCd: 8, color: 'bg-red-500', emoji: '👻' },
                { id: 'lich', name: '巫妖', icon: '💀', desc: '技能：全體減速', baseSpeed: 380, skillCd: 15, color: 'bg-cyan-500', emoji: '💀' },
                { id: 'phantom', name: '幽靈', icon: '🌫️', desc: '技能：隱身加速', baseSpeed: 360, skillCd: 14, color: 'bg-gray-600', emoji: '👽' },
                { id: 'vampire', name: '吸血鬼', icon: '🧛', desc: '技能：強行吸近', baseSpeed: 370, skillCd: 12, color: 'bg-rose-700', emoji: '🧛' },
                { id: 'heavy', name: '重型裝甲', icon: '🦾', desc: '技能：極速衝鋒', baseSpeed: 360, skillCd: 12, color: 'bg-stone-600', emoji: '🤖' },
                { id: 'hacker', name: '代碼駭客', icon: '💻', desc: '技能：反轉人類', baseSpeed: 370, skillCd: 20, color: 'bg-green-600', emoji: '👾' },
                { id: 'assassin', name: '暗影刺客', icon: '🗡️', desc: '技能：潛影暗殺', baseSpeed: 390, skillCd: 14, color: 'bg-violet-800', emoji: '🥷' }
            ],
            zombie: { id: 'zombie', name: '感染者', icon: '🧟', desc: '一般殭屍', baseSpeed: 360, skillCd: 5, color: 'bg-green-800', emoji: '🧟' }
        };

        const SHOP_ITEMS = {
            skins: [
                { id: 'skin_default', name: '預設臉', icon: '😃', price: 0 },
                { id: 'skin_cat', name: '小貓咪', icon: '🐱', price: 100 },
                { id: 'skin_dog', name: '神煩狗', icon: '🐶', price: 150 },
                { id: 'skin_alien', name: '外星人', icon: '👽', price: 300 },
                { id: 'skin_robot', name: '機器人', icon: '🤖', price: 500 },
                { id: 'skin_devil', name: '小惡魔', icon: '😈', price: 800 }
            ],
            taunts: [
                { id: 'taunt_default', name: '大聲公', icon: '📢', price: 0 },
                { id: 'taunt_clown', name: '小丑', icon: '🤡', price: 100 },
                { id: 'taunt_poop', name: '臭屁', icon: '💩', price: 200 },
                { id: 'taunt_pig', name: '豬頭', icon: '🐷', price: 350 },
                { id: 'taunt_laugh', name: '嘲笑', icon: '😂', price: 500 },
                { id: 'taunt_moon', name: '月亮臉', icon: '🌚', price: 800 }
            ]
        };

        const ITEM_TYPES = [
            { type: 'SPEED', icon: '⚡', color: '#fbbf24', radius: 15, duration: 4 },
            { type: 'SHIELD', icon: '🛡️', color: '#60a5fa', radius: 15, duration: 0 }
        ];

        // --- 全域變數 ---
        let MAP_WIDTH = 1500, MAP_HEIGHT = 1500;
        let obstacles = [];
        let items = [], holograms = [], radars = [], floatingTexts = [];
        let humans = [], ghosts = [];
        let player = {};
        
        // 玩家設定與存檔
        let gameMode = 'standard'; // standard, infection
        let selectedMap = 'classic'; // classic, factory, maze
        let selectedRole = 'human';
        let selectedClass = CLASSES.human[0];
        
        // 商城存檔資料
        let coins = parseInt(localStorage.getItem('ghostGameCoins') || '0');
        let inventory = JSON.parse(localStorage.getItem('ghostGameInv') || '{"skins":["skin_default"],"taunts":["taunt_default"]}');
        let equipped = JSON.parse(localStorage.getItem('ghostGameEq') || '{"skin":"skin_default","taunt":"taunt_default"}');

        function saveGameData() {
            localStorage.setItem('ghostGameCoins', coins.toString());
            localStorage.setItem('ghostGameInv', JSON.stringify(inventory));
            localStorage.setItem('ghostGameEq', JSON.stringify(equipped));
            updateCoinDisplay();
        }

        function updateCoinDisplay() {
            UI.coinDisplay.innerText = coins;
            UI.shopCoinDisplay.innerText = coins;
            UI.menuCoinDisplay.innerText = coins;
        }

        // 技能與狀態
        let skillCooldownTimer = 0;
        let tauntCooldownTimer = 0;
        let playerState = {
            isInvisible: false, hasShield: false, speedMultiplier: 1.0, isGhostInvisible: false,
            lastDx: 1, lastDy: 0, isCharging: false, chargeDx: 0, chargeDy: 0, isShadow: false, shadowStun: false,
            tauntTimer: 0
        };

        let gameState = 'START';
        let lastTime = 0, timeLeft = 180.0, animationId, spectateIndex = 0;
        const keys = { w: false, a: false, s: false, d: false, t: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        let pointer = { active: false, x: 0, y: 0 };

        // --- 初始化 ---
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        updateCoinDisplay();

        // --- 輸入監聽 ---
        window.addEventListener('keydown', (e) => { 
            let k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = true; 
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true; // Arrow keys
            if (e.code === 'Space') {
                if (gameState === 'PLAYING') useSkill();
                else if (gameState === 'SPECTATING') switchSpectateTarget();
            }
            if (e.code === 'KeyT') {
                if (gameState === 'PLAYING' && playerRole === 'human') useTaunt();
            }
            if (e.key === 'Escape') togglePause();
        });
        window.addEventListener('keyup', (e) => { 
            let k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = false; 
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false; 
        });

        UI.skillBtn.addEventListener('click', useSkill);
        UI.skillBtn.addEventListener('touchstart', (e) => { e.preventDefault(); useSkill(); });
        UI.tauntBtn.addEventListener('click', useTaunt);
        UI.tauntBtn.addEventListener('touchstart', (e) => { e.preventDefault(); useTaunt(); });

        const updatePointer = e => {
            let cx = e.clientX, cy = e.clientY;
            if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            pointer.x = cx; pointer.y = cy;
        };

        canvas.addEventListener('mousedown', e => { pointer.active = true; updatePointer(e); });
        canvas.addEventListener('mousemove', e => { if (pointer.active) updatePointer(e); });
        window.addEventListener('mouseup', () => { if (pointer.active && gameState === 'SPECTATING') switchSpectateTarget(); pointer.active = false; });
        canvas.addEventListener('touchstart', e => { pointer.active = true; updatePointer(e); }, { passive: false });
        canvas.addEventListener('touchmove', e => { if (pointer.active) updatePointer(e); e.preventDefault(); }, { passive: false });
        window.addEventListener('touchend', () => { if (pointer.active && gameState === 'SPECTATING') switchSpectateTarget(); pointer.active = false; });

        // --- 商城系統 ---
        function openShop() { UI.shopOverlay.classList.remove('hidden'); renderShop(); }
        function closeShop() { UI.shopOverlay.classList.add('hidden'); }

        function renderShop() {
            UI.skinList.innerHTML = '';
            SHOP_ITEMS.skins.forEach(item => {
                let isOwned = inventory.skins.includes(item.id);
                let isEquipped = equipped.skin === item.id;
                let btn = document.createElement('button');
                btn.className = `flex flex-col items-center p-3 rounded-xl border-2 transition-all ${isEquipped ? 'bg-indigo-600 border-indigo-300 shadow-[0_0_10px_#818cf8]' : isOwned ? 'bg-gray-700 border-gray-500 hover:border-gray-300' : 'bg-gray-800 border-gray-700 hover:border-yellow-500'}`;
                btn.innerHTML = `
                    <span class="text-4xl mb-1">${item.icon}</span>
                    <span class="text-xs font-bold text-white">${item.name}</span>
                    <span class="text-xs mt-1 ${isOwned ? 'text-green-400' : 'text-yellow-400 font-bold'}">${isEquipped ? '已裝備' : isOwned ? '擁有' : `💰 ${item.price}`}</span>
                `;
                btn.onclick = () => handleShopClick('skin', item);

        // --- 地圖與障礙物生成 ---
        function generateMap() {
            obstacles = [];
            if (selectedMap === 'classic') {
                MAP_WIDTH = 2000; MAP_HEIGHT = 2000;
                obstacles.push({ x: 400, y: 400, w: 300, h: 60 }); obstacles.push({ x: 400, y: 400, w: 60, h: 300 });
                obstacles.push({ x: 1300, y: 400, w: 300, h: 60 }); obstacles.push({ x: 1540, y: 400, w: 60, h: 300 });
                obstacles.push({ x: 850, y: 850, w: 300, h: 300 });
                obstacles.push({ x: 400, y: 1540, w: 300, h: 60 }); obstacles.push({ x: 400, y: 1300, w: 60, h: 300 });
                obstacles.push({ x: 1300, y: 1540, w: 300, h: 60 }); obstacles.push({ x: 1540, y: 1300, w: 60, h: 300 });
                obstacles.push({ x: 850, y: 300, w: 300, h: 40 }); obstacles.push({ x: 850, y: 450, w: 300, h: 40 });
                obstacles.push({ x: 850, y: 1510, w: 300, h: 40 }); obstacles.push({ x: 850, y: 1660, w: 300, h: 40 });
            } else if (selectedMap === 'factory') {
                MAP_WIDTH = 2400; MAP_HEIGHT = 2400;
                obstacles.push({ x: 300, y: 200, w: 100, h: 800 }); obstacles.push({ x: 550, y: 200, w: 100, h: 800 });
                obstacles.push({ x: 1200, y: 1900, w: 800, h: 100 }); obstacles.push({ x: 1200, y: 2150, w: 800, h: 100 });
                obstacles.push({ x: 1500, y: 400, w: 400, h: 60 }); obstacles.push({ x: 1500, y: 400, w: 60, h: 400 }); obstacles.push({ x: 1840, y: 400, w: 60, h: 400 });
                for(let i=0; i<25; i++) obstacles.push({ x: Math.random()*2200+100, y: Math.random()*2200+100, w: 80+Math.random()*100, h: 80+Math.random()*100 });
            } else if (selectedMap === 'maze') {
                MAP_WIDTH = 3000; MAP_HEIGHT = 3000;
                const cellSize = 300; const wallThickness = 60;
                for (let x = cellSize; x < MAP_WIDTH; x += cellSize) {
                    for (let y = cellSize; y < MAP_HEIGHT; y += cellSize) {
                        if (Math.random() > 0.35) obstacles.push({ x: x - cellSize + wallThickness, y: y, w: cellSize - wallThickness*2, h: wallThickness });
                        if (Math.random() > 0.35) obstacles.push({ x: x, y: y - cellSize + wallThickness, w: wallThickness, h: cellSize - wallThickness*2 });
                        obstacles.push({ x: x, y: y, w: wallThickness, h: wallThickness });
                    }
                }
            }
            obstacles = obstacles.filter(obs => Math.hypot((obs.x + obs.w/2) - MAP_WIDTH/2, (obs.y + obs.h/2) - MAP_HEIGHT/2) > 400);
        }

        function checkCollision(x, y, radius) {
            if (x - radius < 0 || x + radius > MAP_WIDTH || y - radius < 0 || y + radius > MAP_HEIGHT) return true;
            for (let obs of obstacles) {
                let cx = Math.max(obs.x, Math.min(x, obs.x + obs.w));
                let cy = Math.max(obs.y, Math.min(y, obs.y + obs.h));
                if (Math.hypot(x - cx, y - cy) < radius) return true;
            }
            return false;
        }

        function moveEntity(entity, dx, dy) {
            if (!checkCollision(entity.x + dx, entity.y, entity.radius)) entity.x += dx;
            if (!checkCollision(entity.x, entity.y + dy, entity.radius)) entity.y += dy;
        }

        // --- 新增：AI 智慧尋路繞牆系統 ---
        function smartMove(entity, dirX, dirY, speed, dt) {
            let baseAngle = Math.atan2(dirY, dirX);
            // 測試 9 個方向：正前方、微偏、45度、接近垂直
            let anglesToTry = [0, 0.4, -0.4, 0.8, -0.8, 1.2, -1.2, 1.57, -1.57]; 
            let probeDist = entity.radius + 15; // 探測前方是否有障礙物

            let moved = false;
            for (let offset of anglesToTry) {
                let angle = baseAngle + offset;
                let px = entity.x + Math.cos(angle) * probeDist;
                let py = entity.y + Math.sin(angle) * probeDist;
                
                // 如果該偏向路線前方沒有撞牆
                if (!checkCollision(px, py, entity.radius)) {
                    moveEntity(entity, Math.cos(angle) * speed * dt, Math.sin(angle) * speed * dt);
                    moved = true;
                    break;
                }
            }
            if (!moved) {
                // 如果周圍全被塞住（深死角），退回使用原始直線滑牆
                moveEntity(entity, dirX * speed * dt, dirY * speed * dt);
            }
        }

        // --- 技能與嘲諷 ---
        function useSkill() {
            if (skillCooldownTimer > 0 || player.isDead) return;
            const c = player.classData;
            if (c.id === 'runner' || c.id === 'brute' || c.id === 'zombie') {
                playerState.speedMultiplier = 1.8; setTimeout(() => { playerState.speedMultiplier = 1.0; }, 1000);
            } 
            else if (c.id === 'ninja') {
                playerState.isInvisible = true; playerState.speedMultiplier = 1.4; 
                setTimeout(() => { playerState.isInvisible = false; playerState.speedMultiplier = 1.0; }, 5000);
            }
            else if (c.id === 'lich') { humans.forEach(h => { h.frozenTimer = 2.0; }); }
            else if (c.id === 'guardian') { playerState.hasShield = true; }
            else if (c.id === 'jumper') { 
                let angle = Math.random() * Math.PI * 2, dist = 500 + Math.random() * 300; 
                let nx = player.x + Math.cos(angle) * dist, ny = player.y + Math.sin(angle) * dist;
                if (!checkCollision(nx, ny, player.radius)) { player.x = nx; player.y = ny; }
            }
            else if (c.id === 'phantom') {
                playerState.isGhostInvisible = true; playerState.speedMultiplier = 1.3;
                setTimeout(() => { playerState.isGhostInvisible = false; playerState.speedMultiplier = 1.0; }, 2000);
            }
            else if (c.id === 'vampire') {
                humans.forEach(h => { let dx = player.x - h.x, dy = player.y - h.y, dist = Math.hypot(dx, dy); if (dist < 600 && dist > 0) { moveEntity(h, (dx/dist)*150, (dy/dist)*150); } });
            }
            else if (c.id === 'mecha') {
                playerState.speedMultiplier = 3.5; setTimeout(() => { playerState.speedMultiplier = 1.0; }, 300);
            }
            else if (c.id === 'sensor') {
                radars.push({ x: player.x, y: player.y, radius: 250, life: 15.0, triggered: false, pingGhost: false });
            }
            else if (c.id === 'magician') {
                holograms.push({ x: player.x, y: player.y, speed: player.speed * 1.05, life: 6.0, emoji: player.emoji, targetX: player.x, targetY: player.y, aiTimer: 0 });
                playerState.isInvisible = true; playerState.speedMultiplier = 1.3;
                setTimeout(() => { playerState.isInvisible = false; playerState.speedMultiplier = 1.0; }, 3000);
            }
            else if (c.id === 'heavy') {
                playerState.isCharging = true; playerState.chargeDx = playerState.lastDx; playerState.chargeDy = playerState.lastDy; playerState.speedMultiplier = 2.5;
                setTimeout(() => { playerState.isCharging = false; playerState.speedMultiplier = 1.0; }, 1500);
            }
            else if (c.id === 'hacker') {
                humans.forEach(h => { let dist = Math.hypot(player.x - h.x, player.y - h.y); if (dist < 500) { h.reversedTimer = 1.5; } });
            }
            else if (c.id === 'assassin') {
                playerState.isShadow = true; playerState.speedMultiplier = 1.6;
                setTimeout(() => { playerState.isShadow = false; playerState.speedMultiplier = 0.3; playerState.shadowStun = true; setTimeout(() => { playerState.speedMultiplier = 1.0; playerState.shadowStun = false; }, 1000); }, 3500); 
            }
            skillCooldownTimer = c.skillCd;
        }

        function useTaunt() {
            if (tauntCooldownTimer > 0 || player.isDead || playerRole !== 'human') return;
            playerState.tauntTimer = 5.0; // 嘲諷持續 5 秒

        function spawnAIHuman() {

        // --- 遊戲主流程 ---

        function endGame(isWin, message, earnedCoins) {

            else { UI.screenTitle.innerText = "遊戲結束"; UI.screenTitle.className = "text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 mb-2 mt-4"; UI.finalMessage.className = "text-xl font-bold text-red-400"; }

        function calculateCoins() {
            let earned = 0;
            let timeSurvived = 180 - timeLeft;
            if (playerRole === 'human' && gameMode !== 'infection') {
                earned = timeSurvived * 0.5;
                if (humans.includes(player)) earned += 30;
            } else if (playerRole === 'ghost' || (gameMode === 'infection' && playerRole === 'ghost')) { // 包含感染成鬼
                 // 感染模式下，鬼的結算也可以包含抓人獎勵
                let caught = 9 - humans.length;
                earned = caught * 10;
                if (humans.length === 0) earned += 50;
            } else if (playerRole === 'human' && gameMode === 'infection') {
                 // 感染模式下如果還是人
                 earned = timeSurvived * 0.5;
                 if (humans.includes(player)) earned += 50; // 存活下來獎勵更高
            }
            return earned;
        }

        // --- 核心更新邏輯 ---
        function update(dt) {
            timeLeft -= dt; if (timeLeft < 0) timeLeft = 0; UI.timeDisplay.innerText = timeLeft.toFixed(1); UI.humanCountDisplay.innerText = humans.length;
            itemSpawnTimer -= dt; if (itemSpawnTimer <= 0) { spawnItem(); itemSpawnTimer = 6 + Math.random() * 4; }
            
            if (skillCooldownTimer > 0 && !player.isDead) {
                skillCooldownTimer -= dt; UI.skillCdOverlay.classList.remove('hidden'); UI.skillCdText.innerText = Math.ceil(skillCooldownTimer);
                if (skillCooldownTimer <= 0) { skillCooldownTimer = 0; UI.skillCdOverlay.classList.add('hidden'); }
            }
            if (tauntCooldownTimer > 0 && !player.isDead) {
                tauntCooldownTimer -= dt; UI.tauntCdOverlay.classList.remove('hidden'); UI.tauntCdText.innerText = Math.ceil(tauntCooldownTimer);
                if (tauntCooldownTimer <= 0) { tauntCooldownTimer = 0; UI.tauntCdOverlay.classList.add('hidden'); }
            }
            if (playerState.tauntTimer > 0) playerState.tauntTimer -= dt;

            [...humans, ...ghosts].forEach(e => { if (!e.isPlayer && e.speedTimer > 0) { e.speedTimer -= dt; if (e.speedTimer <= 0) e.speedMultiplier = 1.0; } });

            if (timeLeft <= 0) {
                let c = calculateCoins();
                if (playerRole === 'human') { if (humans.length > 0) endGame(true, player.isDead ? "🎉 時間到！人類獲勝 (雖然你犧牲了)" : "🎉 勝利！你存活了 3 分鐘！", c); else endGame(false, "❌ 失敗！全軍覆沒！", c); }
                else { if (humans.length > 0) endGame(false, `❌ 失敗！還有 ${humans.length} 人活著！`, c); else endGame(true, "🎉 勝利！抓到所有人！", c); }
                return;
            }
            if (gameState === 'SPECTATING' && humans.length === 0 && gameMode !== 'infection') { endGame(false, "❌ 失敗！所有人皆被抓捕！", calculateCoins()); return; }

            for (let i = radars.length - 1; i >= 0; i--) {
                let r = radars[i]; r.life -= dt;
                for (let g of ghosts) {
                    if (!r.triggered && Math.hypot(g.x - r.x, g.y - r.y) < r.radius) { if (!((g.isPlayer && playerState.isShadow) || (!g.isPlayer && g.isShadow))) { r.triggered = true; r.life = 3.0; r.pingGhost = true; } }
                }
                if (r.life <= 0) radars.splice(i, 1);
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; ft.life -= dt; ft.y -= 40 * dt;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }

            for (let i = holograms.length - 1; i >= 0; i--) {
                let holo = holograms[i]; holo.life -= dt; holo.aiTimer -= dt;
                if (holo.aiTimer <= 0 || Math.hypot(holo.x - holo.targetX, holo.y - holo.targetY) < 10) { 
                    holo.targetX = holo.x + (Math.random()-0.5)*600; holo.targetY = holo.y + (Math.random()-0.5)*600; holo.aiTimer = 0.5 + Math.random()*1.5; 
                }
                let dx = holo.targetX - holo.x, dy = holo.targetY - holo.y, dist = Math.hypot(dx, dy);
                if (dist > 0) smartMove(holo, dx/dist, dy/dist, holo.speed, dt); // 幻象套用智慧尋路
                if (holo.life <= 0) holograms.splice(i, 1);
            }

            if (gameState === 'PLAYING' && !player.isDead) {
                let dx = 0, dy = 0;
                if (playerState.isCharging) { dx = playerState.chargeDx; dy = playerState.chargeDy; }
                else {
                    if (keys.w || keys.ArrowUp) dy -= 1; if (keys.s || keys.ArrowDown) dy += 1; if (keys.a || keys.ArrowLeft) dx -= 1; if (keys.d || keys.ArrowRight) dx += 1;
                    if (player.reversedTimer > 0) { player.reversedTimer -= dt; dx *= -1; dy *= -1; }
                }
                let curSpeed = player.speed * playerState.speedMultiplier;
                if (player.frozenTimer > 0) { player.frozenTimer -= dt; curSpeed *= 0.3; }

                if (dx !== 0 || dy !== 0) { let length = Math.hypot(dx, dy); let nDx = dx / length, nDy = dy / length; moveEntity(player, nDx*curSpeed*dt, nDy*curSpeed*dt); if (!playerState.isCharging) { playerState.lastDx = player.reversedTimer > 0 ? -nDx : nDx; playerState.lastDy = player.reversedTimer > 0 ? -nDy : nDy; } }
                else if (pointer.active && !playerState.isCharging) { let camX = player.x - canvas.width / 2, camY = player.y - canvas.height / 2, wPX = pointer.x + camX, wPY = pointer.y + camY, pdx = wPX - player.x, pdy = wPY - player.y; if (player.reversedTimer > 0) { pdx *= -1; pdy *= -1; } let dist = Math.hypot(pdx, pdy); if (dist > 5) { let nDx = pdx / dist, nDy = pdy / dist; moveEntity(player, nDx*curSpeed*dt, nDy*curSpeed*dt); playerState.lastDx = player.reversedTimer > 0 ? -nDx : nDx; playerState.lastDy = player.reversedTimer > 0 ? -nDy : nDy; } }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i]; let picked = false;
                for (let entity of [...humans, ...ghosts]) {
                    if (entity.isPlayer && player.isDead) continue;
                    if (ghosts.includes(entity) && item.type === 'SHIELD') continue; 
                    if (Math.hypot(entity.x - item.x, entity.y - item.y) < entity.radius + item.radius) {
                        if (item.type === 'SPEED') { if (entity.isPlayer) { playerState.speedMultiplier = 1.5; setTimeout(() => playerState.speedMultiplier = 1.0, 4000); } else { entity.speedMultiplier = 1.5; entity.speedTimer = 4; } }
                        else if (item.type === 'SHIELD') { if (entity.isPlayer) playerState.hasShield = true; else entity.hasShield = true; }
                        picked = true; break;
                    }
                }
                if (picked) items.splice(i, 1);
            }

            for (let g of ghosts) {
                if (g.isPlayer) continue;
                
                if (g.skillCooldown === undefined) g.skillCooldown = 8 + Math.random() * 5;
                if (g.skillCooldown > 0) g.skillCooldown -= dt;
                else if (g.classData) {
                    let cid = g.classData.id;
                    if (cid === 'brute' || cid === 'zombie') { g.speedMultiplier = 1.8; g.speedTimer = 1.0; }
                    else if (cid === 'lich') { humans.forEach(h => { h.frozenTimer = 2.0; }); }
                    else if (cid === 'phantom') { g.isGhostInvisible = true; g.speedMultiplier = 1.3; g.speedTimer = 2.0; setTimeout(() => {g.isGhostInvisible = false;}, 2000); }
                    else if (cid === 'vampire') { humans.forEach(h => { let dx = g.x - h.x, dy = g.y - h.y, dist = Math.hypot(dx, dy); if (dist < 600 && dist > 0) moveEntity(h, (dx/dist)*150, (dy/dist)*150); }); }
                    else if (cid === 'heavy') { g.speedMultiplier = 2.5; g.speedTimer = 1.5; }
                    else if (cid === 'hacker') { humans.forEach(h => { let dist = Math.hypot(g.x - h.x, g.y - h.y); if (dist < 500) { h.reversedTimer = 1.5; } }); }
                    else if (cid === 'assassin') { g.isShadow = true; g.speedMultiplier = 1.6; g.speedTimer = 3.5; setTimeout(() => { g.isShadow = false; g.speedMultiplier = 0.3; g.speedTimer = 1.0; g.shadowStun = true; setTimeout(() => { g.shadowStun = false; }, 1000); }, 3500); }
                    g.skillCooldown = g.classData.skillCd + Math.random()*3;
                }

                g.aiTimer -= dt;
                if (g.aiTimer <= 0 || !g.targetX) {
                    let closest = null, minDist = Infinity, targets = [...humans].concat(holograms);
                    let taunter = humans.find(h => h.isPlayer && playerState.tauntTimer > 0);
                    if (taunter) { closest = taunter; } 
                    else {
                        for (let h of targets) { 
                            if (h.isPlayer && playerState.isInvisible) continue; 
                            if (!h.isPlayer && h.isInvisible) continue; 
                            let d = Math.hypot(g.x - h.x, g.y - h.y); 
                            if (d < minDist) { minDist = d; closest = h; } 
                        }
                    }
                    if (closest) { g.targetX = closest.x + (Math.random()-0.5)*100; g.targetY = closest.y + (Math.random()-0.5)*100; }
                    g.aiTimer = 0.3 + Math.random()*0.3;
                }
                if (g.targetX) { 
                    let dx = g.targetX - g.x, dy = g.targetY - g.y, dist = Math.hypot(dx, dy), speed = g.speed * (g.speedMultiplier || 1.0); 
                    if (dist > 5) smartMove(g, dx / dist, dy / dist, speed, dt); // AI 鬼套用智慧尋路繞牆
                    else g.aiTimer = 0; 
                }
            }

            for (let h of humans) {
                if (h.isPlayer) continue;
                if (h.skillCooldown > 0) h.skillCooldown -= dt;

                let speed = h.speed * (h.speedMultiplier || 1.0); if (h.frozenTimer > 0) { h.frozenTimer -= dt; speed *= 0.3; }
                let moveMult = 1; if (h.reversedTimer > 0) { h.reversedTimer -= dt; moveMult = -1; }
                
                let nearestGhost = null, minGDist = Infinity;
                for (let g of ghosts) {
                    if (g.isPlayer && (playerState.isGhostInvisible || playerState.isInvisible || playerState.isShadow)) continue;
                    if (!g.isPlayer && (g.isGhostInvisible || g.isShadow)) continue;
                    let d = Math.hypot(h.x - g.x, h.y - g.y);
                    if (d < minGDist) { minGDist = d; nearestGhost = g; }
                }

                if (nearestGhost && minGDist < 600) {
                    if (minGDist < 250 && h.skillCooldown <= 0 && h.classData) {
                        let cid = h.classData.id;
                        if (cid === 'runner') { h.speedMultiplier = 1.8; h.speedTimer = 1.0; }
                        else if (cid === 'ninja') { h.isInvisible = true; h.speedMultiplier = 1.4; h.speedTimer = 5.0; setTimeout(() => { h.isInvisible = false; }, 5000); }
                        else if (cid === 'guardian') { h.hasShield = true; }
                        else if (cid === 'jumper') { 
                            let angle = Math.random() * Math.PI * 2, dist = 500 + Math.random() * 300; 
                            let nx = h.x + Math.cos(angle) * dist, ny = h.y + Math.sin(angle) * dist;
                            if (!checkCollision(nx, ny, h.radius)) { h.x = nx; h.y = ny; }
                        }
                        else if (cid === 'mecha') { h.speedMultiplier = 3.5; h.speedTimer = 0.3; }
                        else if (cid === 'sensor') { radars.push({ x: h.x, y: h.y, radius: 250, life: 15.0, triggered: false, pingGhost: false }); }
                        else if (cid === 'magician') { 
                            holograms.push({ x: h.x, y: h.y, speed: h.speed * 1.05, life: 6.0, emoji: h.emoji, targetX: h.x, targetY: h.y, aiTimer: 0 });
                            h.isInvisible = true; h.speedMultiplier = 1.3; h.speedTimer = 3.0; setTimeout(() => { h.isInvisible = false; }, 3000); 
                        }
                        h.skillCooldown = h.classData.skillCd + Math.random() * 3; 
                    }

                    let vx = ((h.x - nearestGhost.x) / minGDist) * moveMult, vy = ((h.y - nearestGhost.y) / minGDist) * moveMult;
                    
                    let tItem = null, minIDist = 400, hasS = false;
                    for (let item of items) {
                        let d = Math.hypot(item.x - h.x, item.y - h.y);
                        if (d < 400) { if (item.type === 'SHIELD' && !h.hasShield) { if (!hasS || d < minIDist) { minIDist = d; tItem = item; hasS = true; } } else if (!hasS && d < minIDist) { minIDist = d; tItem = item; } }
                    }
                    if (tItem && minGDist > 150) { let attr = hasS ? 2.5 : 1.6; vx = vx*0.3 + ((tItem.x-h.x)/minIDist)*attr; vy = vy*0.3 + ((tItem.y-h.y)/minIDist)*attr; }

                    let m = 150; if (h.x < m) vx += (m - h.x) * 0.03; if (h.x > MAP_WIDTH - m) vx -= (h.x - (MAP_WIDTH - m)) * 0.03; if (h.y < m) vy += (m - h.y) * 0.03; if (h.y > MAP_HEIGHT - m) vy -= (h.y - (MAP_HEIGHT - m)) * 0.03;
                    let len = Math.hypot(vx, vy) || 1; 
                    smartMove(h, vx/len, vy/len, speed, dt); // AI 人類逃亡套用智慧尋路繞牆
                } else if (nearestGhost) {
                    moveEntity(h, (Math.random()-0.5)*20*dt, (Math.random()-0.5)*20*dt);
                }
            }

            for (let g of ghosts) {
                let canCatch = true;
                if (g.isPlayer && (playerState.isShadow || playerState.shadowStun)) canCatch = false;
                if (!g.isPlayer && (g.isShadow || g.shadowStun)) canCatch = false;

                if (canCatch) {
                    for (let i = holograms.length - 1; i >= 0; i--) { if (Math.hypot(g.x - holograms[i].x, g.y - holograms[i].y) < (g.radius + 20) * 0.8) { holograms.splice(i, 1); if (!g.isPlayer) g.aiTimer = 0; } }
                    for (let i = humans.length - 1; i >= 0; i--) {
                        let h = humans[i]; if (Math.hypot(g.x - h.x, g.y - h.y) < (g.radius + h.radius) * 0.8) {
                            let hasS = h.isPlayer ? playerState.hasShield : h.hasShield;
                            if (hasS) { 
                                if (h.isPlayer) playerState.hasShield = false; else h.hasShield = false; 
                                if (!g.isPlayer) { let dx = g.x - h.x, dy = g.y - h.y, d = Math.hypot(dx, dy) || 1; g.x += (dx/d)*150; g.y += (dy/d)*150; } 
                            } else { 
                                // 感染模式抓人賺錢機制
                                if (gameMode === 'infection') {
                                    if (g.isPlayer) {
                                        // 玩家是鬼（或感染者）抓到人加錢
                                        let earned = 15;
                                        coins += earned;
                                        saveGameData();
                                        floatingTexts.push({ x: h.x, y: h.y - 30, text: `+${earned} 💰`, life: 1.5, color: '#fde047' });
                                    }

                                    // 修正：補上 aiTimer, speedMultiplier 等必要屬性，並給予標準殭屍跑速，否則殭屍不會動！
                                    let newG = { x: h.x, y: h.y, radius: 25, speed: CLASSES.zombie.baseSpeed, emoji: '🧟', isPlayer: h.isPlayer, classData: CLASSES.zombie, isGhostInvisible:false, isShadow:false, shadowStun:false, skillCooldown:5, aiTimer: 0, speedMultiplier: 1.0, speedTimer: 0, hasShield: false };
                                    ghosts.push(newG);
                                    if (h.isPlayer) { 
                                        playerRole = 'ghost'; player = newG; UI.tauntUI.classList.add('hidden'); 
                                        UI.roleDisplay.innerText = "追捕者 [感染者]"; UI.roleDisplay.className="text-sm sm:text-lg text-red-400 font-bold"; 
                                        UI.skillIcon.innerText = '🧟'; UI.skillBtn.className = `w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-green-800 border-4 border-white text-3xl shadow-[0_0_20px_rgba(255,255,255,0.5)] active:scale-95 transition-transform flex flex-col items-center justify-center relative overflow-hidden`; 
                                    }
                                    humans.splice(i, 1);
                                } else {
                                    if (h.isPlayer) { if (humans.length > 1) enterSpectateMode(); else return endGame(false, "❌ 被抓到了！", calculateCoins()); humans.splice(i, 1); } else humans.splice(i, 1); 
                                }
                            }
                        }
                    }
                }
            }
            if (humans.length === 0 && (playerRole === 'ghost' || gameMode === 'infection')) endGame(true, `🎉 抓到所有人！耗時 ${(180 - timeLeft).toFixed(1)} 秒`, calculateCoins());
        }

        // --- 繪製函式 ---
        function drawEmoji(emoji, x, y, size, opacity = 1.0) {
            ctx.globalAlpha = opacity; ctx.font = `${size * 2}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, x, y); ctx.globalAlpha = 1.0;
        }

        function draw() {
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.save();
            let cX = MAP_WIDTH/2, cY = MAP_HEIGHT/2;
            if (gameState === 'PLAYING' && !player.isDead) { cX = player.x; cY = player.y; }
            else if (gameState === 'SPECTATING' && humans.length > 0) { let t = humans[spectateIndex % humans.length]; cX = t.x; cY = t.y; }
            else if (playerRole === 'ghost') { cX = player.x; cY = player.y; }
            ctx.translate(-(cX - canvas.width / 2), -(cY - canvas.height / 2));
            
            let floorColor = '#1e293b', gridColor = '#334155', edgeColor = '#ef4444', obsColor = '#334155', obsEdge = '#0f172a';
            if (selectedMap === 'factory') { floorColor = '#27272a'; gridColor = '#3f3f46'; edgeColor = '#eab308'; obsColor = '#52525b'; obsEdge = '#18181b'; } 
            else if (selectedMap === 'maze') { floorColor = '#064e3b'; gridColor = '#065f46'; edgeColor = '#10b981'; obsColor = '#022c22'; obsEdge = '#064e3b'; }

            ctx.fillStyle = floorColor; ctx.fillRect(0, 0, MAP_WIDTH, MAP_HEIGHT); 
            ctx.strokeStyle = gridColor; ctx.lineWidth = 2; ctx.beginPath(); 
            for (let x = 0; x <= MAP_WIDTH; x += 150) { ctx.moveTo(x, 0); ctx.lineTo(x, MAP_HEIGHT); } 
            for (let y = 0; y <= MAP_HEIGHT; y += 150) { ctx.moveTo(0, y); ctx.lineTo(MAP_WIDTH, y); } 
            ctx.stroke(); 
            
            ctx.strokeStyle = edgeColor; ctx.lineWidth = 8; ctx.strokeRect(0, 0, MAP_WIDTH, MAP_HEIGHT);

            ctx.fillStyle = obsColor; ctx.strokeStyle = obsEdge; ctx.lineWidth = 4;
            obstacles.forEach(obs => { ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.strokeRect(obs.x, obs.y, obs.w, obs.h); });

            radars.forEach(r => { ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2); ctx.fillStyle = r.triggered ? 'rgba(239, 68, 68, 0.15)' : 'rgba(20, 184, 166, 0.1)'; ctx.fill(); ctx.strokeStyle = r.triggered ? '#ef4444' : '#14b8a6'; ctx.lineWidth = 2; ctx.stroke(); if (r.triggered && r.pingGhost) { let g = ghosts[0]; ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(g.x, g.y); ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.setLineDash([10, 10]); ctx.stroke(); ctx.setLineDash([]); } });
            items.forEach(it => { let bob = Math.sin(performance.now()/150 + it.bobTimer)*5; ctx.beginPath(); ctx.arc(it.x, it.y + bob, it.radius * 1.5, 0, Math.PI * 2); ctx.fillStyle = it.color; ctx.globalAlpha = 0.3; ctx.fill(); ctx.globalAlpha = 1.0; drawEmoji(it.icon, it.x, it.y + bob, it.radius); });
            holograms.forEach(ho => { drawEmoji(ho.emoji, ho.x, ho.y, 20, 0.7); ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 2; ctx.strokeRect(ho.x-18, ho.y-18, 36, 36); });

            humans.forEach((h, i) => {
                let op = ((h.isPlayer && playerState.isInvisible) || (!h.isPlayer && h.isInvisible)) ? 0.3 : 1.0;
                if (h.frozenTimer > 0) { ctx.beginPath(); ctx.arc(h.x, h.y, h.radius + 8, 0, Math.PI * 2); ctx.fillStyle = '#67e8f9'; ctx.globalAlpha = 0.5; ctx.fill(); ctx.globalAlpha = 1.0; }
                drawEmoji(h.emoji, h.x, h.y, h.radius, op);
                if (h.classData && !h.isPlayer) { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(h.x - 30, h.y - h.radius - 35, 60, 20); ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.fillText(h.classData.name, h.x, h.y - h.radius - 20); }
                if (h.reversedTimer > 0) { ctx.fillStyle = '#22c55e'; ctx.font = '16px Arial'; ctx.fillText('👾', h.x, h.y - h.radius - 10); }
                if (h.isPlayer && playerState.tauntTimer > 0) { ctx.fillStyle = '#ef4444'; ctx.font = '24px Arial'; ctx.fillText(getEquippedIcon('taunt'), h.x, h.y - h.radius - 15); }
                if (h.isPlayer) { ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(h.x, h.y, h.radius + 5, 0, Math.PI * 2); ctx.stroke(); }
                if (h.isPlayer ? playerState.hasShield : h.hasShield) { ctx.strokeStyle = '#fde047'; ctx.lineWidth = 4; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.arc(h.x, h.y, h.radius + 12, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]); }
                if (gameState === 'SPECTATING' && i === (spectateIndex % humans.length)) { ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(h.x, h.y, h.radius + 8, 0, Math.PI * 2); ctx.stroke(); }
            });

            ghosts.forEach(g => {
                let op = 1.0; if (g.isPlayer && (playerState.isGhostInvisible || playerState.isShadow)) op = 0.1; if (!g.isPlayer && (g.isGhostInvisible || g.isShadow)) op = 0.1;
                
                // 殭屍和一般的鬼用不同的發光顏色區分
                let glowColor = g.emoji === '🧟' ? '34, 197, 94' : '220, 38, 38'; // 綠色 或 紅色

                ctx.beginPath();
                ctx.arc(g.x, g.y, g.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${glowColor}, ${op})`;
                ctx.shadowColor = `rgba(${glowColor}, 0.8)`;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0; 

                drawEmoji(g.emoji, g.x, g.y, g.radius * 0.85, op);

                if (g.classData) { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(g.x - 30, g.y - g.radius - 35, 60, 20); ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.fillText(g.classData.name, g.x, g.y - g.radius - 20); }
                if (g.isPlayer) {
                    ctx.strokeStyle = '#f87171'; ctx.lineWidth = 3; ctx.globalAlpha = op; ctx.beginPath(); ctx.arc(g.x, g.y, g.radius + 5, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1.0;
                    if (playerState.shadowStun) { ctx.fillStyle = '#d1d5db'; ctx.font = '24px Arial'; ctx.fillText('💢', g.x, g.y - g.radius - 15); }
                } else {
                    if (g.shadowStun) { ctx.fillStyle = '#d1d5db'; ctx.font = '24px Arial'; ctx.fillText('💢', g.x, g.y - g.radius - 15); }
                    if (playerState.tauntTimer > 0 && playerRole === 'human' && !player.isDead) { ctx.fillStyle = '#ef4444'; ctx.font = '24px Arial'; ctx.fillText('💢', g.x + 15, g.y - g.radius - 10); } 
                }
                if (g.hasShield || (g.isPlayer && playerState.hasShield)) { ctx.strokeStyle = '#fde047'; ctx.lineWidth = 4; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.arc(g.x, g.y, g.radius + 12, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]); }
            });

            floatingTexts.forEach(ft => {
                ctx.globalAlpha = Math.max(0, Math.min(1, ft.life));
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1.0;
            });

            ctx.restore();
        }

        function gameLoop(timestamp) {
            if (gameState === 'PAUSED') { animationId = requestAnimationFrame(gameLoop); return; }
            if (gameState !== 'PLAYING' && gameState !== 'SPECTATING') return;
            let dt = (timestamp - lastTime) / 1000; if (dt > 0.1) dt = 0.1; lastTime = timestamp; update(dt); draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 初始設定選單
        selectMode('standard');
        selectRole('human');
    </script>
</body>
